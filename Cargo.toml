# C0PL4ND — a cross-platform, GPU-accelerated terminal emulator.
# "The operator's shell into the wired."
[workspace]
resolver = "2"
members = ["crates/core", "crates/renderer", "crates/app"]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
license = "MIT OR Apache-2.0"
homepage = "https://github.com/itasha-corp/c0pl4nd"
repository = "https://github.com/itasha-corp/c0pl4nd"
authors = ["Itasha.Corp"]
description = "A fast, GPU-accelerated, local-first terminal emulator for Windows, Linux, and macOS."

[workspace.dependencies]
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
