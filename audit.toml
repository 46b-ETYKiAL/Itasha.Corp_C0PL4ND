# cargo-audit configuration (RustSec advisory DB).
# Mirrors the [advisories] ignore in deny.toml so the standalone `cargo audit`
# CI step and `cargo deny check` agree. Run: cargo audit

[advisories]
# RUSTSEC-2017-0008: `serial` unmaintained (informational advisory, NOT a
# memory-safety/exploitable vulnerability). Transitive via portable-pty 0.8.1
# (Windows serial handling); C0PL4ND does not use the serial API surface. The
# fix (portable-pty 0.9.0, swapping `serial` -> `serial2`) is BLOCKED by the
# open Windows ConPTY regression https://github.com/wezterm/wezterm/issues/6783
# (0.9.0 is the latest crates.io release). Re-evaluate and remove this entry
# when portable-pty > 0.9.0 ships the fix. See .github/scorecard-notes.md.
#
# RUSTSEC-2023-0071: `rsa` Marvin-Attack timing side-channel. NO PATCH AVAILABLE
# upstream. Transitive via the Arti Tor directory-crypto stack, pulled ONLY by
# the opt-in `itasha-report-transport-tor` anonymous transport (OFF by default).
# Mirrors the deny.toml ignore. Drop when `rsa` ships a constant-time release
# and Arti adopts it.
# RUSTSEC-2024-0436 / RUSTSEC-2026-0173: `paste` / `proc-macro-error2` are
# UNMAINTAINED build-time proc-macro helpers (compile-time only, not runtime
# attack surface) entering transitively via the Arti stack / the W1TN3SS SDK's
# `age` E2E stack. Mirrors the deny.toml ignores.
# RUSTSEC-2026-0190: `anyhow` unsoundness in `Error::downcast_mut()` — UB only
# via `Error::context(X)` then `downcast_mut::<X>()`. C0PL4ND never calls
# `downcast_mut` (zero hits in `crates/`), so exposure is nil; no patched anyhow
# release exists (1.0.102 is latest). Mirrors the deny.toml ignore. Drop + bump
# when anyhow ships a fix.
ignore = [
    "RUSTSEC-2017-0008",
    "RUSTSEC-2023-0071",
    "RUSTSEC-2024-0436",
    "RUSTSEC-2026-0173",
    "RUSTSEC-2026-0190",
    # RUSTSEC-2026-0192: `ttf-parser` UNMAINTAINED (informational). Transitive
    # font parser via the egui text stack (fontdb / cosmic-text / glyphon).
    # Mirrors the deny.toml ignore (lockstep SC-1).
    "RUSTSEC-2026-0192",
    # RUSTSEC-2025-0141: `bincode` UNMAINTAINED (informational). Present only as
    # an OPTIONAL, feature-gated dep of `typed-index-collections` that this build
    # never enables (not in the compiled graph). Mirrors the deny.toml ignore.
    "RUSTSEC-2025-0141",
    # RUSTSEC-2026-0186: `memmap2` UNSOUND (unchecked pointer offset). Transitive
    # read-only mmap via fontdb / winit (sctk-adwaita) / Arti tor-dirmgr; never
    # called directly. No patched 0.9.x yet. Mirrors the deny.toml ignore.
    "RUSTSEC-2026-0186",
]
