[package]
name = "c0pl4nd"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "C0PL4ND — a fast, local-first, GPU-accelerated terminal emulator."

[[bin]]
name = "c0pl4nd"
path = "src/main.rs"

[dependencies]
c0pl4nd-core = { path = "../core" }
c0pl4nd-renderer = { path = "../renderer" }
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
winit = "0.30"
wgpu = "29"
glyphon = "0.11"
pollster = "0.4"
ureq = "2"
image = { version = "0.25", default-features = false, features = ["png"] }

# D4 (Windows-only): Win32 custom-frame Aero Snap on the frameless window.
# Used solely by the `#[cfg(windows)]` `win_snap` module; not linked elsewhere.
[target.'cfg(windows)'.dependencies]
windows = { version = "0.62", features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_UI_Shell",
    "Win32_UI_WindowsAndMessaging",
] }
