# cargo-audit configuration — https://github.com/rustsec/rustsec/tree/main/cargo-audit
#
# Tracked, justified advisory exceptions. Each entry is an ACCEPTED RISK with a
# documented reason and a re-evaluation trigger — not a silent suppression.

[advisories]
ignore = [
  # RUSTSEC-2017-0008 — the `serial` crate is UNMAINTAINED (informational
  # advisory, NOT an exploitable vulnerability).
  #
  #   Why accepted:
  #     * `serial` is a TRANSITIVE dependency, pulled in only by
  #       `portable-pty 0.8` for its serial-PORT support. C0PL4ND is a
  #       terminal emulator: it uses the PTY path exclusively and never
  #       touches portable-pty's serial-port API, so the unmaintained code
  #       is not on any reachable path.
  #     * The only upgrade that drops `serial` is `portable-pty 0.9`
  #       (which swaps it for the maintained `serial2`), BUT 0.9.0 is
  #       KNOWN-BROKEN on Windows — `pty.read` returns garbage / the
  #       ConPTY round-trip hangs. Verified locally (the shell-spawn echo
  #       round-trip never completes; session-render test fails) and
  #       confirmed upstream: wezterm/wezterm#6783 (OPEN, unfixed as of
  #       2026-05; 0.8.1 works, 0.9.0 does not).
  #
  #   Re-evaluation trigger:
  #     Upgrade to portable-pty >= 0.9.x as soon as wezterm/wezterm#6783
  #     is fixed and the Windows ConPTY round-trip is verified green, then
  #     DELETE this ignore. Until then, a working terminal outweighs
  #     clearing a non-exploitable unmaintained-dep notice.
  "RUSTSEC-2017-0008",
  # RUSTSEC-2023-0071 — the `rsa` crate's Marvin Attack timing side-channel.
  #
  #   Why accepted:
  #     * NO PATCH IS AVAILABLE upstream (the advisory states a constant-time
  #       implementation is still in progress — there is no fixed version to
  #       bump to).
  #     * `rsa` is a TRANSITIVE dependency that enters the tree ONLY through the
  #       Arti Tor directory-crypto stack, pulled by the opt-in
  #       `itasha-report-transport-tor` anonymous-transport crate (the onion
  #       transport is OFF by default). The RSA operations are Tor's own
  #       directory/handshake crypto operated by Arti, not C0PL4ND-supplied
  #       keys, and the attack requires an adversary to observe RSA-operation
  #       timing over the network.
  #
  #   Re-evaluation trigger:
  #     Drop this ignore once `rsa` ships a constant-time release AND Arti
  #     adopts it (bump arti-client / the transport crate accordingly).
  "RUSTSEC-2023-0071",
  # RUSTSEC-2026-0173 — `proc-macro-error2` is UNMAINTAINED (informational
  # advisory, NOT exploitable). Kept in lockstep with deny.toml (audit SC-1: a
  # divergent ignore-list let a green `cargo deny` coexist with a red `cargo
  # audit`). BUILD-TIME proc-macro helper pulled transitively by
  # `i18n-embed-fl` <- `age` <- the in-house `itasha-report-core` SDK; runs only
  # at compile time, never in the shipped binary's runtime attack surface.
  # Re-evaluate when `age`/`i18n-embed-fl` migrate off `proc-macro-error2`.
  "RUSTSEC-2026-0173",
  # RUSTSEC-2024-0436 — `paste` is UNMAINTAINED (informational advisory, NOT
  # exploitable). Kept in lockstep with deny.toml. BUILD-TIME proc-macro helper
  # pulled transitively by the Arti Tor stack (`paste` <- `tor-error` <-
  # arti-client), entering the tree ONLY via the opt-in
  # `itasha-report-transport-tor` crate; compile-time only. No maintained drop-in
  # upstream Arti has migrated to yet. Re-evaluate when `tor-error` drops `paste`.
  "RUSTSEC-2024-0436",
  # RUSTSEC-2026-0190 — `anyhow` unsoundness in `Error::downcast_mut()`. Kept in
  # lockstep with deny.toml + audit.toml.
  #
  #   Why accepted:
  #     * The UB is reachable ONLY via `Error::context(X)` followed by
  #       `downcast_mut::<X>()` on the returned error. C0PL4ND does NOT call
  #       `downcast_mut` anywhere (`grep -rn downcast_mut crates/` => zero hits),
  #       so the unsound path is unreachable and exposure is nil.
  #     * NO PATCHED RELEASE is available: anyhow 1.0.102 is the latest on
  #       crates.io (`cargo update -p anyhow` locks 0 packages).
  #
  #   Re-evaluation trigger:
  #     Drop this ignore and bump as soon as anyhow ships a fixed release.
  "RUSTSEC-2026-0190",
]
