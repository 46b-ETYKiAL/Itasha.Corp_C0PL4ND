name: Post-Release Verify (tripwire)

# Tier 2: an INDEPENDENT post-publish tripwire. After a release publishes, this
# SEPARATE workflow run re-downloads the PUBLISHED assets and verifies them
# against the SAME public key the deployed client embeds — the per-asset minisign
# signatures, the Tier 1 signed manifest, the manifest -> asset SHA-256 binding,
# and bare trusted comments. It deliberately does NOT trust release.yml's own
# self-verify gate: a green build that published a bad / mismatched / wrongly
# signed artifact (the Ollama-2026 / electron-2020 fail-open class) is caught
# here by a second pair of eyes that only sees what users would actually download.
# Any failure fails the run = the alert.

on:
  # NOT `release: published` — a release created by release.yml's GITHUB_TOKEN
  # does NOT trigger `release` events (GitHub suppresses workflow cascades from
  # token-created events to prevent recursion), so the tripwire would never fire
  # automatically. `workflow_run` fires after the Release workflow completes
  # regardless of how Release was triggered, so this independent verification
  # actually runs on every published release.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify (e.g. v0.4.11)"
        required: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify published release against the embedded key
    runs-on: ubuntu-latest
    # Only verify a SUCCESSFUL, tag-triggered Release run (or a manual dispatch).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - name: Harden the runner (egress audit)
        # step-security/harden-runner@v2.19.4
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit

      - name: Checkout source (for the embedded public key)
        # actions/checkout@v4.2.2 — single-source-of-truth for the key; read it
        # from update_engine/verify.rs at the verified ref (do not hardcode).
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Install rsign2
        run: cargo install rsign2 --locked --version "^0.6"

      - name: Download + verify published assets (fail-closed)
        env:
          GH_TOKEN: ${{ github.token }}
          # For a tag-triggered Release run, workflow_run.head_branch is the tag
          # (e.g. v0.4.11); for a manual run, the dispatch input.
          TAG: ${{ github.event.workflow_run.head_branch || inputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p verify && cd verify
          gh release download "$TAG" -R "$GITHUB_REPOSITORY" --clobber
          # Reconstruct the embedded public key the deployed client trusts.
          pub=$(grep -oE 'RW[A-Za-z0-9+/=]{40,}' ../crates/app/src/update_engine/verify.rs | head -1)
          [ -n "$pub" ] || { echo "::error::could not extract the embedded public key from verify.rs"; exit 1; }
          printf 'untrusted comment: c0pl4nd minisign public key\n%s\n' "$pub" > rsign.pub
          # (1) The Tier 1 manifest MUST be published AND verify against the key.
          { [ -f latest.json ] && [ -f latest.json.minisig ]; } || { echo "::error::published release is missing latest.json / latest.json.minisig"; exit 1; }
          rsign verify -p rsign.pub -x latest.json.minisig latest.json >/dev/null \
            || { echo "::error::latest.json signature does NOT verify against the embedded key"; exit 1; }
          # (2) Every manifest asset: per-asset sig verifies, trusted comment is a
          #     bare filename, and the downloaded bytes' SHA-256 == the SIGNED
          #     manifest digest (the identity binding).
          python3 - <<'PY'
          import json, subprocess, hashlib, sys, os
          m = json.load(open("latest.json"))
          fail = False
          for a in m["assets"]:
              name = a["asset_name"]
              if not os.path.exists(name):
                  print(f"::error::manifest asset {name} is not in the published release"); fail = True; continue
              got = hashlib.sha256(open(name, "rb").read()).hexdigest()
              if got.lower() != a["sha256"].lower():
                  print(f"::error::{name} sha256 {got} != signed manifest {a['sha256']} (binding broken)"); fail = True
              sig = name + ".minisig"
              if not os.path.exists(sig):
                  # Signed-manifest-only asset set (Stage 2, v0.4.24+): the
                  # SHA-256 binding checked above IS authoritative — latest.json's
                  # own signature was verified in step (1), so its pinned digest is
                  # trusted, and a bit-for-bit substitution is impossible without a
                  # SHA-256 preimage. An absent per-asset .minisig is therefore
                  # fine; it mirrors the in-app updater's
                  # verify_artifact_bound_optional_sig tolerate-absent path.
                  print(f"note: {name} ships no .minisig; verified via the signed-manifest SHA-256")
                  continue
              r = subprocess.run(["rsign", "verify", "-p", "rsign.pub", "-x", sig, name],
                                 capture_output=True, text=True)
              if r.returncode != 0:
                  print(f"::error::{name} signature does not verify against the embedded key: {r.stderr.strip()}"); fail = True
              tok = ""
              for line in open(sig, encoding="utf-8", errors="replace").read().splitlines():
                  if line.startswith("trusted comment:"):
                      for field in line.split("\t"):
                          if field.strip().startswith("file:"):
                              tok = field.strip()[5:]
              if "/" in tok or "\\" in tok:
                  print(f"::error::{name} trusted comment carries a path, not a bare name: {tok}"); fail = True
              elif tok and tok != name:
                  print(f"::error::{name} trusted comment file:{tok} != asset name {name}"); fail = True
          if fail:
              sys.exit(1)
          print(f"tripwire OK: {len(m['assets'])} published assets verified against the embedded key "
                f"(manifest sig + per-asset sig + bare identity + signed-sha256 binding)")
          PY
          rm -f rsign.pub
