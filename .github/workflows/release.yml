name: Release

# Hardened release for C0PL4ND. Improvements over the baseline release.yml:
#   - SLSA build provenance attestation (actions/attest-build-provenance) on
#     every shipped binary + installer (SLSA v1 Build L2 on public repos via the
#     public-good Sigstore instance; verifiable with `gh attestation verify`).
#   - CycloneDX SBOM (cargo-cyclonedx) generated and published per release.
#   - All third-party actions pinned by full commit SHA.
#   - Least-privilege permissions; id-token + attestations scopes granted only
#     to the jobs that need them.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build a release for (e.g. v1.2.3)"
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: c0pl4nd

jobs:
  # --------------------------------------------------------------------------
  # Build a release binary per OS/arch + per-binary SLSA provenance attestation.
  # --------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      # Required to mint the Sigstore signing cert + write the attestation.
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        # The full Windows + Linux + macOS desktop matrix, x64 and ARM64, each
        # built on a NATIVE GitHub-hosted runner (no cross-linkers) — except the
        # Intel-mac target, which the universal Apple toolchain cross-builds on
        # the Apple-Silicon runner. Free arm64 public-repo runners
        # (ubuntu-24.04-arm / windows-11-arm) went GA 2025-08-07. These six
        # triples match the update-manifest's platform classifier.
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          # x86_64 mac is cross-built on the Apple-Silicon runner via the
          # universal Apple toolchain (rustup adds the target; clang emits a
          # native x86_64 Mach-O). This avoids the scarce/queue-starved macos-13
          # Intel runner — the arm64 leg above already proves the macOS build.
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
    steps:
      - name: Harden the runner (egress audit)
        # step-security/harden-runner@v2.19.4
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit

      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain @master commit
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cargo-auditable
        # SBOM-in-binary: `cargo auditable build` embeds the dependency tree
        # (versions + sources) into a `.dep-v0` section of the shipped binary,
        # so it self-describes and can be audited post-hoc with `cargo audit
        # bin <binary>` even without the source tree. This is a build-wrapper
        # only — it does not change the binary's runtime behavior or add a
        # runtime dependency.
        # taiki-e/install-action@v2.79.10 — reproducible prebuilt-tool install.
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853
        with:
          tool: cargo-auditable

      - name: Cache cargo registry and target
        # Swatinem/rust-cache@v2.9.1
        # zizmor: ignore[cache-poisoning]
        # zizmor's cache-poisoning heuristic is Low-confidence and fires on the
        # mere presence of rust-cache in a tag-triggered job; it does not parse
        # `save-if`. We set `save-if: false` below so this step is RESTORE-ONLY
        # and can never persist a poisoned cache. The residual restore risk is
        # neutralised by `--locked` builds. Annotation documents the disposition.
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: ". -> target"
          key: ${{ matrix.target }}
          # zizmor cache-poisoning remedy: this release job runs on tag pushes
          # (a privileged, artifact-producing context). Restore caches but never
          # SAVE one from here, so a release build can never persist a poisoned
          # cache that a later build would restore. Builds use `--locked` so a
          # cold cache only costs time, not correctness.
          # https://docs.zizmor.sh/audits/#cache-poisoning
          save-if: false

      - name: Install Linux GUI/display build dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libfontconfig1-dev

      - name: Build release binary (with embedded SBOM)
        # `cargo auditable build` is a drop-in wrapper for `cargo build` that
        # embeds the dependency tree into the binary (auditable post-hoc via
        # `cargo audit bin`). Same flags as a plain release build; runtime
        # behavior is unchanged.
        run: cargo auditable build --release --locked --target ${{ matrix.target }} --bin ${{ env.BIN_NAME }}

      - name: Determine version
        id: version
        shell: bash
        # zizmor template-injection remedy: pass workflow context through the
        # `env:` block so the values arrive as shell variables, never as raw
        # `${{ ... }}` text spliced into the script body. See
        # https://docs.zizmor.sh/audits/#template-injection
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        # zizmor template-injection remedy: context values via `env:`, not
        # spliced into the script body.
        env:
          TAG: ${{ steps.version.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          tag="${TAG}"
          target="${TARGET}"
          stage="${BIN_NAME}-${tag}-${target}"
          mkdir -p "dist/${stage}"
          cp "target/${target}/release/${BIN_NAME}" "dist/${stage}/"
          cp LICENSE-MIT LICENSE-APACHE README.md "dist/${stage}/" 2>/dev/null || true
          ( cd dist && tar -czf "${stage}.tar.gz" "${stage}" )
          ( cd dist && shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256" )
          echo "artifact=dist/${stage}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # zizmor template-injection remedy: context values via `env:`, not
        # spliced into the script body.
        env:
          TAG: ${{ steps.version.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:TAG
          $target = $env:TARGET
          $stage = "$env:BIN_NAME-$tag-$target"
          New-Item -ItemType Directory -Force -Path "dist/$stage" | Out-Null
          Copy-Item "target/$target/release/$env:BIN_NAME.exe" "dist/$stage/"
          foreach ($f in @("LICENSE-MIT","LICENSE-APACHE","README.md")) {
            if (Test-Path $f) { Copy-Item $f "dist/$stage/" }
          }
          Compress-Archive -Path "dist/$stage/*" -DestinationPath "dist/$stage.zip" -Force
          $hash = (Get-FileHash "dist/$stage.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $stage.zip" | Out-File -Encoding ascii "dist/$stage.zip.sha256"
          "artifact=dist/$stage.zip" | Out-File -Encoding ascii -Append $env:GITHUB_ENV

      - name: Attest build provenance (SLSA)
        # actions/attest-build-provenance@v4.1.0
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: ${{ env.artifact }}

      - name: Upload build artifacts
        # actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: |
            ./dist/*.tar.gz
            ./dist/*.zip
            ./dist/*.sha256
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # CycloneDX SBOM for the whole workspace, published with the release.
  # --------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden the runner (egress audit)
        # step-security/harden-runner@v2.19.4
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit

      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain @master commit
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable

      - name: Install cargo-cyclonedx (version-pinned via cargo install)
        # Pin the SBOM generator to an EXACT version with `--locked` so the SBOM
        # tooling itself is reproducible release-to-release (a moving installer
        # tag could silently change the CycloneDX spec version or output shape).
        # `cargo install --locked` builds from crates.io against the tool's own
        # committed Cargo.lock — no surprise transitive drift.
        run: cargo install cargo-cyclonedx --locked --version 0.5.7

      - name: Generate CycloneDX SBOM
        run: |
          set -euo pipefail
          mkdir -p sbom
          # NOTE: do NOT pass `--override-filename` — it renames output to
          # `<name>.json` (dropping the `.cdx` infix) AND collides all workspace
          # members onto one filename, so the `*.cdx.json` collector below found
          # nothing and the job failed. Default naming writes one
          # `<crate>.cdx.json` per member (c0pl4nd / c0pl4nd-core /
          # c0pl4nd-renderer), which the collector + attest glob match.
          cargo cyclonedx --all --format json
          # cargo-cyclonedx writes one `<crate>.cdx.json` per workspace member.
          # Ship ONLY the top-level app SBOM (`c0pl4nd.cdx.json`): it is the
          # dependency SUPERSET — c0pl4nd-core and c0pl4nd-renderer are deps of the
          # app, so their trees are already inside it, and we ship only the app
          # binary. Collecting the two library SBOMs too was pure release-asset
          # noise (they duplicate subtrees of the app SBOM for crates we never ship
          # standalone). One SBOM, one attestation, one published asset.
          find . -name 'c0pl4nd.cdx.json' -not -path './target/*' -exec cp {} sbom/ \;
          ls -la sbom
          # Fail loudly if the app SBOM was not produced (don't ship without it).
          test "$(find sbom -name 'c0pl4nd.cdx.json' | wc -l)" -gt 0

      - name: Record toolchain build-provenance (rustc -vV + pin hash)
        # Reproducible-build provenance text artifact. Captures the EXACT compiler
        # identity (`rustc -vV` → version, commit-hash, commit-date, llvm) plus the
        # committed `rust-toolchain.toml` pin and its SHA-256, so a downstream
        # verifier can confirm which toolchain produced a given release. This is
        # the plain-text complement to the SLSA attestation: human-readable, and
        # it survives even when the attestation infra is unavailable.
        run: |
          set -euo pipefail
          mkdir -p sbom
          prov="sbom/BUILD-PROVENANCE.txt"
          {
            echo "C0PL4ND build provenance"
            echo "tag: ${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
            echo "commit: ${GITHUB_SHA}"
            echo "generated-at-utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "=== rustc -vV ==="
            rustc -vV
            echo
            echo "=== cargo --version ==="
            cargo --version
            echo
            echo "=== rust-toolchain.toml (pinned channel) ==="
            if [ -f rust-toolchain.toml ]; then
              cat rust-toolchain.toml
              echo
              echo "rust-toolchain.toml sha256: $(sha256sum rust-toolchain.toml | cut -d' ' -f1)"
            else
              echo "(rust-toolchain.toml not present)"
            fi
          } > "$prov"
          echo "--- ${prov} ---"
          cat "$prov"

      - name: Attest SBOM provenance
        # actions/attest-build-provenance@v4.1.0
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: "sbom/*.cdx.json"

      - name: Upload SBOM + build-provenance artifact
        # actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom
          path: |
            sbom/*.cdx.json
            sbom/BUILD-PROVENANCE.txt
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Brand rasters for the Windows installer — generated on Linux (clean librsvg
  # rasterization) and handed to the Windows packaging job. The Itasha.Corp
  # installer framework (F0RG3-W1R3) owns the branding + NSIS config; only the
  # compiled binary crosses from this repo (binary-input-contract).
  # --------------------------------------------------------------------------
  # --------------------------------------------------------------------------
  # Windows installer — the native Itasha.Corp CRT provisioning-console installer
  # (F0RG3-W1R3, Rust/eframe). Replaces the stock NSIS: the compiled binary +
  # assets are the payload; the installer is brand-themed, per-machine (pre-fills
  # C:\Program Files\Itasha.Corp\C0PL4ND), and reusable across apps. SignPath
  # Foundation signing is gated on SIGNPATH_ORG_ID (unsigned otherwise).
  # --------------------------------------------------------------------------
  windows-installer:
    name: Windows installer (native CRT)
    needs: build
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - name: Checkout C0PL4ND (assets + licenses)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: app
          persist-credentials: false
      - name: Checkout installer framework (F0RG3-W1R3)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: 46b-ETYKiAL/Itasha.Corp_F0RG3-W1R3
          path: framework
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
      - name: Cache cargo + installer target
        # Swatinem/rust-cache@v2.9.1 — restore-only on tag builds (no poisoned save)
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: framework/installer -> target
          key: native-installer
          save-if: false
      - name: Download Windows binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: c0pl4nd-x86_64-pc-windows-msvc
          path: winbin
      - name: Assemble payload (binary + assets + licenses)
        shell: bash
        run: |
          set -euo pipefail
          zip="$(find winbin -name '*.zip' | head -1)"
          [ -n "$zip" ] || { echo "no windows binary zip under winbin/"; exit 1; }
          python -c "import zipfile,sys; zipfile.ZipFile(sys.argv[1]).extractall('winbin/x')" "$zip"
          exe="$(find winbin/x -name 'c0pl4nd.exe' | head -1)"
          [ -n "$exe" ] || { echo "c0pl4nd.exe not found"; exit 1; }
          mkdir -p payload
          cp "$exe" payload/
          if [ -d app/assets ]; then cp -r app/assets payload/assets; fi
          for f in LICENSE-MIT LICENSE-APACHE README.md; do [ -f "app/$f" ] && cp "app/$f" payload/ || true; done
          echo "payload contents:"; find payload -maxdepth 2 | head -40
      - name: Build native installer
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist-out
          python framework/scripts/build_native_installer.py \
            --app c0pl4nd \
            --binary-dir payload \
            --version "$TAG" \
            --out "dist-out/c0pl4nd-${TAG}-x86_64-setup.exe"
          ls -la dist-out
      # --- SignPath Foundation signing (gated; inactive until SIGNPATH_ORG_ID set) ---
      - name: Upload unsigned installer (for SignPath)
        id: unsigned
        if: vars.SIGNPATH_ORG_ID != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: unsigned-installer
          path: dist-out/*.exe
      - name: Sign via SignPath Foundation
        if: vars.SIGNPATH_ORG_ID != ''
        # SignPath/github-action-submit-signing-request@v2
        uses: SignPath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: c0pl4nd
          signing-policy-slug: release-signing
          artifact-configuration-slug: installer
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist-out
      - name: Checksum installer (final, signed-or-unsigned)
        shell: bash
        run: |
          set -euo pipefail
          cd dist-out
          for e in *.exe; do sha256sum "$e" > "$e.sha256"; done
          cat *.sha256
      - name: Attest installer provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: dist-out/*.exe
      - name: Upload installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-installer
          path: dist-out/
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [build, sbom, windows-installer]
    runs-on: ubuntu-latest
    permissions:
      # The only job that needs write to create the release + upload assets.
      contents: write
      # Tier 2: SLSA build-provenance attestation over the FINAL published asset
      # set (not just the per-job artifacts) needs OIDC + attestations write.
      id-token: write
      attestations: write
    if: always() && needs.build.result == 'success' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Harden the runner (egress audit)
        # step-security/harden-runner@v2.19.4
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit

      - name: Checkout source (for the embedded-key self-verify gate)
        # The release job otherwise only downloads built artifacts — it has no
        # source tree. The fail-closed verify gate below reconstructs the SAME
        # public key the deployed client embeds from update_engine/verify.rs, so
        # the source must be present. Checkout into an isolated `src/` subdir so
        # it never collides with the `artifacts/` + `release/` asset dirs.
        # actions/checkout@v4.2.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: src
          persist-credentials: false

      - name: Download all artifacts
        # actions/download-artifact@v4.3.0
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts

      - name: Flatten artifacts + aggregate checksums
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \
            \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.exe' -o -name '*.sha256' -o -name '*.cdx.json' -o -name 'BUILD-PROVENANCE.txt' \) \
            -exec cp {} release/ \;
          ( cd release && cat *.sha256 > SHA256SUMS 2>/dev/null || true )
          ls -la release

      - name: Generate update manifest (latest.json, Tier 1)
        # Tier 1 identity binding: emit a manifest that declares, per platform,
        # {asset_name, sha256, size, url} plus {version, release_index,
        # minimum_version, valid_until_utc}. It is created BEFORE the signing
        # step, so the existing sign loop produces `latest.json.minisig` and the
        # fail-closed verify gate checks it like any other asset. The in-app
        # updater (Tier 1 clients) verifies THIS manifest against the embedded
        # key, then verifies each download's SHA-256 against the signed digest
        # here — making artifact identity a SIGNED HASH, not an unsigned GitHub
        # JSON field or a tool-dependent trusted-comment string. `valid_until_utc`
        # is the freeze beacon (a stale "latest" is detectable); `minimum_version`
        # is the signed security floor. No repo checkout is needed — the manifest
        # is derived purely from the staged release/ assets + the tag.
        shell: bash
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python3 - "$REPO" "$TAG" <<'PY'
          import sys, os, json, hashlib, datetime
          repo, tag = sys.argv[1], sys.argv[2]
          ver = tag[1:] if tag.startswith("v") else tag
          rel = "release"
          TRIPLES = (
              "x86_64-pc-windows-msvc", "aarch64-pc-windows-msvc",
              "x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu",
              "x86_64-apple-darwin", "aarch64-apple-darwin",
          )
          def platform_of(name):
              for t in TRIPLES:
                  if t in name:
                      return t
              # NSIS installer (c0pl4nd-<tag>-x86_64-setup.exe) is a Windows x64 asset.
              if name.endswith("setup.exe") or name.endswith(".exe"):
                  return "x86_64-pc-windows-msvc"
              return None
          def kind_of(name):
              if name.endswith(".zip"): return "zip"
              if name.endswith(".tar.gz"): return "tar.gz"
              if name.endswith(".exe"): return "exe"
              return "other"
          assets = []
          for fn in sorted(os.listdir(rel)):
              p = os.path.join(rel, fn)
              if not os.path.isfile(p):
                  continue
              if not fn.endswith((".zip", ".tar.gz", ".exe")):
                  continue            # archives/installers only (skip sidecars/SBOMs/manifest)
              plat = platform_of(fn)
              if plat is None:
                  continue
              with open(p, "rb") as fh:
                  digest = hashlib.sha256(fh.read()).hexdigest()
              assets.append({
                  "platform": plat, "kind": kind_of(fn), "asset_name": fn,
                  "url": f"https://github.com/{repo}/releases/download/{tag}/{fn}",
                  "size": os.path.getsize(p), "sha256": digest,
              })
          if not assets:
              print("::error::manifest generation found no archive/installer assets in release/")
              sys.exit(1)
          assets.sort(key=lambda a: (a["platform"], a["asset_name"]))
          core = ver.split("+")[0].split("-")[0].split(".")
          maj, minr, pat = (core + ["0", "0", "0"])[:3]
          release_index = int(maj) * 1_000_000 + int(minr) * 1_000 + int(pat)
          now = datetime.datetime.now(datetime.timezone.utc).replace(microsecond=0)
          fmt = "%Y-%m-%dT%H:%M:%SZ"
          manifest = {
              "schema": "itasha.update.manifest/v1",
              "product": "c0pl4nd",
              "version": ver,
              "release_index": release_index,
              # Raised to 0.4.23 (the first sidecar-tolerant updater,
              # verify_artifact_bound_optional_sig) BECAUSE this release stops
              # shipping the per-binary .minisig/.sha256. A client below this floor
              # (a pre-0.4.23 updater that still REQUIRES those sidecars) is told
              # "a fresh install is required" — a graceful message emitted BEFORE
              # it resolves a now-absent sidecar — instead of a cryptic
              # missing-sidecar failure. v0.4.23+ clients verify via the signed
              # manifest SHA-256 and auto-update seamlessly.
              "minimum_version": "0.4.23",
              "published_utc": now.strftime(fmt),
              "valid_until_utc": (now + datetime.timedelta(days=14)).strftime(fmt),
              "assets": assets,
          }
          with open(os.path.join(rel, "latest.json"), "w", encoding="utf-8") as out:
              json.dump(manifest, out, indent=2, sort_keys=True)
              out.write("\n")
          print(f"manifest: v{ver} release_index={release_index} assets={len(assets)} valid_until={manifest['valid_until_utc']}")
          PY
          echo "----- release/latest.json -----"
          cat release/latest.json

      - name: Sign release artifacts (rsign2, when key provisioned)
        # Sign every release asset with minisign (via rsign2 — the same tool the
        # key was generated with; its signatures verify against the embedded key
        # through the app's `minisign-verify` crate). Mirrors the sibling SCR1B3
        # editor's release-signing step verbatim (see SCR1B3 packaging/signing.md)
        # so both Itasha apps share ONE in-app-update signing convention. The
        # in-app updater (Settings → Updates) checks SHA-256 THEN minisign and
        # REFUSES to install anything that fails; each `<asset>` gets a
        # `<asset>.minisig` sibling (the `.sha256` siblings already exist from the
        # build job) and `files: release/*` below uploads them.
        #
        # ACTIVATION (one-time, repo owner): a passwordless rsign2 keypair was
        # generated (`rsign generate -W`); the public half is embedded in
        # `update_engine/verify.rs` and the secret half written to
        # `.s4f3-data/c0pl4nd-minisign-secret.key` (OUTSIDE the repo). Add that
        # secret-key file's CONTENTS as the `MINISIGN_SECRET_KEY` Actions secret.
        # Absent → this step is a NO-OP (artifacts ship checksummed but UNSIGNED;
        # the updater then rejects them — fail-closed). The in-script guard avoids
        # the secrets-in-`if` evaluation gotcha and fails safe.
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            # A stable (non-prerelease) tag has no '-' in its name (e.g. v0.4.6);
            # an rc/pre tag does (v0.4.6-rc.2). Shipping a STABLE release UNSIGNED
            # is a release-readiness landmine: the fail-closed in-app updater
            # rejects unsigned artifacts, so existing users could not auto-update
            # to it — a release that looks successful yet is un-updatable. Fail
            # loudly for stable tags; allow the unsigned path only for prereleases.
            case "${GITHUB_REF_NAME:-}" in
              *-*)
                echo "::warning::MINISIGN_SECRET_KEY not set — shipping checksummed but UNSIGNED prerelease artifacts (auto-update will reject them; acceptable for an rc/pre tag)."
                exit 0
                ;;
              *)
                echo "::error::MINISIGN_SECRET_KEY not set on a STABLE tag (${GITHUB_REF_NAME:-?}). A stable release MUST be signed — the fail-closed in-app updater rejects unsigned artifacts, so existing users could not auto-update to it. Provision the signing key (see this step's comment) or cut a prerelease (-rc/-pre) tag instead. Failing the release."
                exit 1
                ;;
            esac
          fi
          cargo install rsign2 --locked --version "^0.6"
          umask 077
          keypath="$PWD/sk.key"
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$keypath"
          count=0
          # Sign every release asset except the signatures themselves (matches the
          # in-app updater, which fetches each archive's `.minisig` sibling).
          #
          # CRITICAL: sign with the BARE filename (from INSIDE release/), so the
          # minisign trusted comment records `file:<name>` and NOT
          # `file:release/<name>`. The in-app updater binds the trusted-comment
          # `file:` token to the bare downloaded asset name; signing a path-
          # prefixed argument writes the prefix into the trusted comment and the
          # fail-closed updater rejects the artifact ("trusted-comment file
          # mismatch"), breaking auto-update for EVERY deployed client.
          while IFS= read -r f; do
            base=$(basename "$f")
            ( cd "$(dirname "$f")" && rsign sign -W -s "$keypath" -x "${base}.minisig" "$base" )
            count=$((count + 1))
          done < <(find release -type f ! -name '*.minisig')
          shred -u "$keypath" 2>/dev/null || rm -f "$keypath"
          echo "signed $count release artifact(s)"
          # ── Fail-closed verification gate (Tier 0 hardening) ───────────────
          # A green build that publishes an artifact the EMBEDDED client key
          # cannot verify is the Ollama-2026 / electron-updater-2020 fail-OPEN
          # class of bug. So before publishing we reconstruct the SAME public key
          # the deployed client embeds and cryptographically self-verify every
          # signed asset against it — plus identity, coverage, count-parity,
          # digest cross-check, and a tamper test. ANY miss fails the release.
          pub=$(grep -oE 'RW[A-Za-z0-9+/=]{40,}' src/crates/app/src/update_engine/verify.rs | head -1)
          if [ -z "$pub" ]; then
            echo "::error::could not extract the embedded public key from verify.rs — cannot self-verify the release. Aborting."
            exit 1
          fi
          printf 'untrusted comment: c0pl4nd minisign public key\n%s\n' "$pub" > rsign.pub
          assets=0; verified=0
          for f in release/*; do
            case "$f" in *.minisig) continue ;; esac
            [ -f "$f" ] || continue
            assets=$((assets + 1))
            base=$(basename "$f")
            sig="release/${base}.minisig"
            # (A) Coverage — every published asset MUST be signed.
            if [ ! -f "$sig" ]; then
              echo "::error::missing signature for $base — every published asset must be signed. Aborting."; exit 1
            fi
            # (C) Crypto-verify against the EMBEDDED client key (fail-closed).
            if ! rsign verify -p rsign.pub -x "$sig" "$f" >/dev/null 2>&1; then
              echo "::error::$base does NOT verify against the embedded public key — the deployed client would reject it. Aborting."; exit 1
            fi
            # (D) Identity — trusted-comment file: token is the BARE asset name, exact.
            ft=$(grep -m1 '^trusted comment:' "$sig" | grep -oE 'file:[^[:space:]]+' | head -1 | sed 's/^file://')
            case "$ft" in
              */*|*\\*)
                echo "::error::$sig trusted comment carries a PATH ($ft) — the updater would reject it. Aborting."; exit 1 ;;
            esac
            if [ -n "$ft" ] && [ "$ft" != "$base" ]; then
              echo "::error::$sig trusted-comment file:'$ft' != asset '$base' (wrong-artifact binding). Aborting."; exit 1
            fi
            # (F) Digest cross-check vs the .sha256 sidecar when present.
            if [ -f "release/${base}.sha256" ]; then
              want=$(awk '{print $1; exit}' "release/${base}.sha256")
              got=$(sha256sum "$f" | awk '{print $1}')
              if [ "$(printf '%s' "$want" | tr 'A-Z' 'a-z')" != "$(printf '%s' "$got" | tr 'A-Z' 'a-z')" ]; then
                echo "::error::$base sha256 sidecar mismatch (want $want got $got). Aborting."; exit 1
              fi
            fi
            verified=$((verified + 1))
          done
          # (B) Count parity — verified-asset count == signature-file count.
          nminisig=$(find release -name '*.minisig' | wc -l | tr -d ' ')
          if [ "$verified" -ne "$nminisig" ]; then
            echo "::error::signature count parity failed (verified $verified assets, $nminisig .minisig files). Aborting."; exit 1
          fi
          # (G) Tamper test — a mutated copy MUST fail verification; if it passes,
          # the gate itself is broken and we must NOT trust this run.
          orig=$(find release -type f ! -name '*.minisig' | head -1)
          if [ -n "$orig" ]; then
            tf=$(mktemp); cp "$orig" "$tf"; printf '\x00' >> "$tf"
            if rsign verify -p rsign.pub -x "release/$(basename "$orig").minisig" "$tf" >/dev/null 2>&1; then
              echo "::error::tamper test PASSED verification — the signing gate is broken. Aborting."; rm -f "$tf"; exit 1
            fi
            rm -f "$tf"
          fi
          rm -f rsign.pub
          echo "release gate GREEN: $assets artifact(s) verified against the embedded key (crypto + bare-name identity + digest + count-parity + tamper)."
          ls -la release

      - name: Prune redundant signature sidecars before publish
        # The fail-closed sign+verify gate above signs and self-verifies EVERY
        # asset (unchanged — the hardening is fully intact). We then drop, before
        # upload, every sidecar the published set no longer needs, keeping only the
        # SIGNED aggregate manifests (latest.json + SHA256SUMS and their .minisig).
        # A binary's authenticity now rests on the signed-manifest SHA-256 (the
        # in-app updater, v0.4.23+) and the signed SHA256SUMS (manual verify) — the
        # per-binary .minisig/.sha256 were redundant with both.
        #
        # SAFE for deployed clients because this release also raised the manifest
        # `minimum_version` to 0.4.23 (the first sidecar-tolerant updater): a
        # client below that floor is told "a fresh install is required" (graceful)
        # BEFORE it ever tries to resolve a now-absent sidecar — never a cryptic
        # missing-sidecar error. v0.4.23+ clients verify via the pinned signed
        # manifest hash and auto-update seamlessly.
        #
        # Deterministic and never touches a binary, latest.json, SHA256SUMS, the
        # SBOM, BUILD-PROVENANCE.txt, or the two KEPT .minisig — only per-binary
        # and derived-file signatures/checksums.
        run: |
          set -euo pipefail
          before=$(find release -type f | wc -l | tr -d ' ')
          find release -type f \( \
              -name '*.tar.gz.minisig' -o -name '*.zip.minisig' -o -name '*.exe.minisig' \
              -o -name '*.tar.gz.sha256' -o -name '*.zip.sha256' -o -name '*.exe.sha256' \
              -o -name '*.sha256.minisig' -o -name '*.cdx.json.minisig' \
              -o -name 'BUILD-PROVENANCE.txt.minisig' \
            \) -delete
          after=$(find release -type f | wc -l | tr -d ' ')
          echo "pruned $((before - after)) sidecar(s); ${after} asset(s) will be published"
          # Guard: the SIGNED aggregate manifests MUST survive the prune.
          for keep in latest.json latest.json.minisig SHA256SUMS SHA256SUMS.minisig; do
            [ -f "release/$keep" ] || { echo "::error::prune removed required $keep"; exit 1; }
          done
          ls -la release

      - name: Attest published release assets (SLSA provenance, Tier 2)
        # Tier 2: attest the FINAL published asset set as it will be uploaded —
        # archives + installer + the Tier 1 latest.json manifest + SBOMs +
        # SHA256SUMS — so a verifier can prove every released byte was built by
        # THIS workflow at THIS tag (gh attestation verify / slsa-verifier). This
        # complements (does not replace) the per-asset minisign signatures and the
        # earlier per-job attestations; it is the one attestation over the exact
        # bytes the GitHub Release publishes. The `.minisig` (signatures) and
        # `.sha256` (redundant with SHA256SUMS) sidecars are intentionally not
        # attested.
        # actions/attest-build-provenance@v4.1.0
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: |
            release/*.zip
            release/*.tar.gz
            release/*.exe
            release/latest.json
            release/*.cdx.json
            release/SHA256SUMS

      - name: Create GitHub Release
        # softprops/action-gh-release@v3.0.2
        # zizmor: ignore[superfluous-actions]
        # Deliberate: this action is SHA-pinned, gives declarative asset globs
        # (`files: release/*`), `generate_release_notes`, and prerelease
        # detection that a hand-rolled `gh release create` script would have to
        # re-implement. The functionality overlaps the runner's `gh` CLI but the
        # ergonomic + auditable surface is worth keeping; no security delta.
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release/*
