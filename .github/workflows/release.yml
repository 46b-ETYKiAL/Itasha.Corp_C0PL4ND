name: Release

# Hardened release for C0PL4ND. Improvements over the baseline release.yml:
#   - SLSA build provenance attestation (actions/attest-build-provenance) on
#     every shipped binary + installer (SLSA v1 Build L2 on public repos via the
#     public-good Sigstore instance; verifiable with `gh attestation verify`).
#   - CycloneDX SBOM (cargo-cyclonedx) generated and published per release.
#   - All third-party actions pinned by full commit SHA.
#   - Least-privilege permissions; id-token + attestations scopes granted only
#     to the jobs that need them.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build a release for (e.g. v1.2.3)"
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: c0pl4nd

jobs:
  # --------------------------------------------------------------------------
  # Build a release binary per OS/arch + per-binary SLSA provenance attestation.
  # --------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      # Required to mint the Sigstore signing cert + write the attestation.
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - name: Harden the runner (egress audit)
        # step-security/harden-runner@v2.19.4
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain @master commit
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        # Swatinem/rust-cache@v2.9.1
        # zizmor: ignore[cache-poisoning]
        # zizmor's cache-poisoning heuristic is Low-confidence and fires on the
        # mere presence of rust-cache in a tag-triggered job; it does not parse
        # `save-if`. We set `save-if: false` below so this step is RESTORE-ONLY
        # and can never persist a poisoned cache. The residual restore risk is
        # neutralised by `--locked` builds. Annotation documents the disposition.
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: ". -> target"
          key: ${{ matrix.target }}
          # zizmor cache-poisoning remedy: this release job runs on tag pushes
          # (a privileged, artifact-producing context). Restore caches but never
          # SAVE one from here, so a release build can never persist a poisoned
          # cache that a later build would restore. Builds use `--locked` so a
          # cold cache only costs time, not correctness.
          # https://docs.zizmor.sh/audits/#cache-poisoning
          save-if: false

      - name: Install Linux GUI/display build dependencies
        if: runner.os == 'Linux' && matrix.cross != true
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libfontconfig1-dev

      - name: Install cross (for cross-compiled Linux targets)
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build release binary (native)
        if: matrix.cross != true
        run: cargo build --release --locked --target ${{ matrix.target }} --bin ${{ env.BIN_NAME }}

      - name: Build release binary (cross)
        if: matrix.cross == true
        run: cross build --release --locked --target ${{ matrix.target }} --bin ${{ env.BIN_NAME }}

      - name: Determine version
        id: version
        shell: bash
        # zizmor template-injection remedy: pass workflow context through the
        # `env:` block so the values arrive as shell variables, never as raw
        # `${{ ... }}` text spliced into the script body. See
        # https://docs.zizmor.sh/audits/#template-injection
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        # zizmor template-injection remedy: context values via `env:`, not
        # spliced into the script body.
        env:
          TAG: ${{ steps.version.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          tag="${TAG}"
          target="${TARGET}"
          stage="${BIN_NAME}-${tag}-${target}"
          mkdir -p "dist/${stage}"
          cp "target/${target}/release/${BIN_NAME}" "dist/${stage}/"
          cp LICENSE-MIT LICENSE-APACHE README.md "dist/${stage}/" 2>/dev/null || true
          ( cd dist && tar -czf "${stage}.tar.gz" "${stage}" )
          ( cd dist && shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256" )
          echo "artifact=dist/${stage}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # zizmor template-injection remedy: context values via `env:`, not
        # spliced into the script body.
        env:
          TAG: ${{ steps.version.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:TAG
          $target = $env:TARGET
          $stage = "$env:BIN_NAME-$tag-$target"
          New-Item -ItemType Directory -Force -Path "dist/$stage" | Out-Null
          Copy-Item "target/$target/release/$env:BIN_NAME.exe" "dist/$stage/"
          foreach ($f in @("LICENSE-MIT","LICENSE-APACHE","README.md")) {
            if (Test-Path $f) { Copy-Item $f "dist/$stage/" }
          }
          Compress-Archive -Path "dist/$stage/*" -DestinationPath "dist/$stage.zip" -Force
          $hash = (Get-FileHash "dist/$stage.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $stage.zip" | Out-File -Encoding ascii "dist/$stage.zip.sha256"
          "artifact=dist/$stage.zip" | Out-File -Encoding ascii -Append $env:GITHUB_ENV

      - name: Attest build provenance (SLSA)
        # actions/attest-build-provenance@v4.1.0
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: ${{ env.artifact }}

      - name: Upload build artifacts
        # actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: |
            ./dist/*.tar.gz
            ./dist/*.zip
            ./dist/*.sha256
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # CycloneDX SBOM for the whole workspace, published with the release.
  # --------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden the runner (egress audit)
        # step-security/harden-runner@v2.19.4
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain @master commit
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Install cargo-cyclonedx
        # taiki-e/install-action@v2.79.10
        uses: taiki-e/install-action@15413b256f995d819248ea62704771a959284285
        with:
          tool: cargo-cyclonedx

      - name: Generate CycloneDX SBOM
        run: |
          set -euo pipefail
          mkdir -p sbom
          cargo cyclonedx --all --format json --override-filename c0pl4nd-sbom
          # cargo-cyclonedx writes per-crate files; collect them.
          find . -name '*.cdx.json' -not -path './target/*' -exec cp {} sbom/ \;
          ls -la sbom

      - name: Attest SBOM provenance
        # actions/attest-build-provenance@v4.1.0
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: "sbom/*.cdx.json"

      - name: Upload SBOM artifact
        # actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom
          path: sbom/*.cdx.json
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Brand rasters for the Windows installer — generated on Linux (clean librsvg
  # rasterization) and handed to the Windows packaging job. The Itasha.Corp
  # installer framework (F0RG3-W1R3) owns the branding + NSIS config; only the
  # compiled binary crosses from this repo (binary-input-contract).
  # --------------------------------------------------------------------------
  brand-assets:
    name: Brand rasters (installer art)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Checkout installer framework (F0RG3-W1R3)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 46b-ETYKiAL/Itasha.Corp_F0RG3-W1R3
          persist-credentials: false
      - name: Install rasterizers (librsvg + imagemagick)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin imagemagick
      - name: Generate C0PL4ND brand rasters
        run: |
          set -euo pipefail
          chmod +x branding/gen-assets.sh
          ./branding/gen-assets.sh --app c0pl4nd
          echo "Generated rasters:"; find branding -type f \( -name '*.ico' -o -name '*.bmp' -o -name '*.png' \) -print
      - name: Upload brand rasters
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: brand-rasters
          path: branding/
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Branded Windows installer — the Itasha.Corp NSIS installer, forged by
  # F0RG3-W1R3 / cargo-packager from the compiled binary. PRIMARY Windows
  # download (replaces the stock MSI). Unsigned interim: SmartScreen warns;
  # SHA-256 + SLSA attestation provided. SignPath Foundation (free OSS) signing
  # is wired behind secret-presence once the cert is approved.
  # --------------------------------------------------------------------------
  windows-installer:
    name: Windows installer (branded NSIS)
    needs: [build, brand-assets]
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Checkout installer framework (F0RG3-W1R3)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 46b-ETYKiAL/Itasha.Corp_F0RG3-W1R3
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - name: Install cargo-packager (pinned, locked)
        shell: bash
        run: cargo install cargo-packager --version 0.11.8 --locked
      - name: Download brand rasters
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: brand-rasters
          path: branding
      - name: Download Windows binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: c0pl4nd-x86_64-pc-windows-msvc
          path: winbin
      - name: Forge branded NSIS installer
        shell: bash
        run: |
          set -euo pipefail
          # extract the compiled Windows binary built by the `build` job
          zip="$(find winbin -name '*.zip' | head -1)"
          [ -n "$zip" ] || { echo "no windows binary zip under winbin/"; exit 1; }
          python -c "import zipfile,sys; zipfile.ZipFile(sys.argv[1]).extractall('winbin/extracted')" "$zip"
          exe="$(find winbin/extracted -name 'c0pl4nd.exe' | head -1)"
          [ -n "$exe" ] || { echo "c0pl4nd.exe not found in zip"; exit 1; }
          exe_win="$(cygpath -w "$(realpath "$exe")")"
          echo "Binary input: $exe_win"
          # Merge shared template + per-app override -> standalone config.
          python tests/merge_config.py c0pl4nd --root . --output merged.packager.toml --binary-path "$exe_win"
          # cargo-packager 0.11.8 hits os error 267 on Windows for --config <FILE>
          # (the file-read branch is broken). Pass the config as a RAW JSON STRING
          # (the documented alternative) to bypass file reading. Also normalize the
          # template's packaging/build-relative license path (../../X -> X) since we
          # package from the framework root.
          CFG="$(python -c "import tomllib,json; d=tomllib.load(open('merged.packager.toml','rb')); d={k:(v[6:] if isinstance(v,str) and v.startswith('../../') else v) for k,v in d.items()}; print(json.dumps(d,separators=(',',':')))")"
          echo "==> Packaging via raw-JSON config (nsis only); cargo-packager auto-fetches NSIS"
          cargo-packager -c "$CFG" --formats nsis
      - name: Collect + name installer
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist-out
          setup="$(find . -maxdepth 2 -name '*-setup.exe' -not -path './winbin/*' -not -path './dist-out/*' | head -1)"
          [ -n "$setup" ] || { echo "cargo-packager produced no -setup.exe"; ls -la; exit 1; }
          tag="${TAG:-v0.0.0}"
          name="c0pl4nd-${tag}-x86_64-setup.exe"
          cp "$setup" "dist-out/$name"
          ( cd dist-out && sha256sum "$name" > "$name.sha256" )
          echo "Installer: $name"
          cat "dist-out/$name.sha256"
      - name: Attest installer provenance (SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist-out/*.exe
      - name: Upload installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-installer
          path: dist-out/
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Publish a GitHub Release with every archive, checksum, and the SBOM.
  # (Installer packaging — MSI/DMG/AppImage/DEB — lives in the existing
  #  release.yml installers job; merge that job in unchanged. Attest each
  #  installer artifact with the same attest-build-provenance step.)
  # --------------------------------------------------------------------------
  release:
    name: Publish Release
    needs: [build, sbom, windows-installer]
    runs-on: ubuntu-latest
    permissions:
      # The only job that needs write to create the release + upload assets.
      contents: write
    if: always() && needs.build.result == 'success' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Harden the runner (egress audit)
        # step-security/harden-runner@v2.19.4
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Download all artifacts
        # actions/download-artifact@v4.3.0
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts

      - name: Flatten artifacts + aggregate checksums
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \
            \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.exe' -o -name '*.sha256' -o -name '*.cdx.json' \) \
            -exec cp {} release/ \;
          ( cd release && cat *.sha256 > SHA256SUMS 2>/dev/null || true )
          ls -la release

      - name: Create GitHub Release
        # softprops/action-gh-release@v2.6.2
        # zizmor: ignore[superfluous-actions]
        # Deliberate: this action is SHA-pinned, gives declarative asset globs
        # (`files: release/*`), `generate_release_notes`, and prerelease
        # detection that a hand-rolled `gh release create` script would have to
        # re-implement. The functionality overlaps the runner's `gh` CLI but the
        # ergonomic + auditable surface is worth keeping; no security delta.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release/*
