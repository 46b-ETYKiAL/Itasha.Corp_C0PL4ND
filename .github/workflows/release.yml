name: Release

# Hardened release for C0PL4ND. Improvements over the baseline release.yml:
#   - SLSA build provenance attestation (actions/attest-build-provenance) on
#     every shipped binary + installer (SLSA v1 Build L2 on public repos via the
#     public-good Sigstore instance; verifiable with `gh attestation verify`).
#   - CycloneDX SBOM (cargo-cyclonedx) generated and published per release.
#   - All third-party actions pinned by full commit SHA.
#   - Least-privilege permissions; id-token + attestations scopes granted only
#     to the jobs that need them.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build a release for (e.g. v1.2.3)"
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: c0pl4nd

jobs:
  # --------------------------------------------------------------------------
  # Build a release binary per OS/arch + per-binary SLSA provenance attestation.
  # --------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      # Required to mint the Sigstore signing cert + write the attestation.
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - name: Harden the runner (egress audit)
        # step-security/harden-runner@v2.19.4
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain @master commit
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        # Swatinem/rust-cache@v2.9.1
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: ". -> target"
          key: ${{ matrix.target }}

      - name: Install Linux GUI/display build dependencies
        if: runner.os == 'Linux' && matrix.cross != true
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libfontconfig1-dev

      - name: Install cross (for cross-compiled Linux targets)
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build release binary (native)
        if: matrix.cross != true
        run: cargo build --release --locked --target ${{ matrix.target }} --bin ${{ env.BIN_NAME }}

      - name: Build release binary (cross)
        if: matrix.cross == true
        run: cross build --release --locked --target ${{ matrix.target }} --bin ${{ env.BIN_NAME }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          target="${{ matrix.target }}"
          stage="${BIN_NAME}-${tag}-${target}"
          mkdir -p "dist/${stage}"
          cp "target/${target}/release/${BIN_NAME}" "dist/${stage}/"
          cp LICENSE-MIT LICENSE-APACHE README.md "dist/${stage}/" 2>/dev/null || true
          ( cd dist && tar -czf "${stage}.tar.gz" "${stage}" )
          ( cd dist && shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256" )
          echo "artifact=dist/${stage}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ steps.version.outputs.tag }}"
          $target = "${{ matrix.target }}"
          $stage = "$env:BIN_NAME-$tag-$target"
          New-Item -ItemType Directory -Force -Path "dist/$stage" | Out-Null
          Copy-Item "target/$target/release/$env:BIN_NAME.exe" "dist/$stage/"
          foreach ($f in @("LICENSE-MIT","LICENSE-APACHE","README.md")) {
            if (Test-Path $f) { Copy-Item $f "dist/$stage/" }
          }
          Compress-Archive -Path "dist/$stage/*" -DestinationPath "dist/$stage.zip" -Force
          $hash = (Get-FileHash "dist/$stage.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $stage.zip" | Out-File -Encoding ascii "dist/$stage.zip.sha256"
          "artifact=dist/$stage.zip" | Out-File -Encoding ascii -Append $env:GITHUB_ENV

      - name: Attest build provenance (SLSA)
        # actions/attest-build-provenance@v4.1.0
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: ${{ env.artifact }}

      - name: Upload build artifacts
        # actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: |
            ./dist/*.tar.gz
            ./dist/*.zip
            ./dist/*.sha256
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # CycloneDX SBOM for the whole workspace, published with the release.
  # --------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden the runner (egress audit)
        # step-security/harden-runner@v2.19.4
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain @master commit
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Install cargo-cyclonedx
        # taiki-e/install-action@v2.79.10
        uses: taiki-e/install-action@60ae4ce63c7aeb6e96d7f572c1ec7fafbb17ca80
        with:
          tool: cargo-cyclonedx

      - name: Generate CycloneDX SBOM
        run: |
          set -euo pipefail
          mkdir -p sbom
          cargo cyclonedx --all --format json --override-filename c0pl4nd-sbom
          # cargo-cyclonedx writes per-crate files; collect them.
          find . -name '*.cdx.json' -not -path './target/*' -exec cp {} sbom/ \;
          ls -la sbom

      - name: Attest SBOM provenance
        # actions/attest-build-provenance@v4.1.0
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: "sbom/*.cdx.json"

      - name: Upload SBOM artifact
        # actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom
          path: sbom/*.cdx.json
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Publish a GitHub Release with every archive, checksum, and the SBOM.
  # (Installer packaging — MSI/DMG/AppImage/DEB — lives in the existing
  #  release.yml installers job; merge that job in unchanged. Attest each
  #  installer artifact with the same attest-build-provenance step.)
  # --------------------------------------------------------------------------
  release:
    name: Publish Release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    permissions:
      # The only job that needs write to create the release + upload assets.
      contents: write
    if: always() && needs.build.result == 'success'
    steps:
      - name: Harden the runner (egress audit)
        # step-security/harden-runner@v2.19.4
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Download all artifacts
        # actions/download-artifact@v4.3.0
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts

      - name: Flatten artifacts + aggregate checksums
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \
            \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' -o -name '*.cdx.json' \) \
            -exec cp {} release/ \;
          ( cd release && cat *.sha256 > SHA256SUMS 2>/dev/null || true )
          ls -la release

      - name: Create GitHub Release
        # softprops/action-gh-release@v2.6.2
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release/*
