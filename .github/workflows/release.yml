name: Release

# Hardened release for C0PL4ND. Improvements over the baseline release.yml:
#   - SLSA build provenance attestation (actions/attest-build-provenance) on
#     every shipped binary + installer (SLSA v1 Build L2 on public repos via the
#     public-good Sigstore instance; verifiable with `gh attestation verify`).
#   - CycloneDX SBOM (cargo-cyclonedx) generated and published per release.
#   - All third-party actions pinned by full commit SHA.
#   - Least-privilege permissions; id-token + attestations scopes granted only
#     to the jobs that need them.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build a release for (e.g. v1.2.3)"
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: c0pl4nd

jobs:
  # --------------------------------------------------------------------------
  # Build a release binary per OS/arch + per-binary SLSA provenance attestation.
  # --------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      # Required to mint the Sigstore signing cert + write the attestation.
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        # Release matrix trimmed to the two shipped desktop targets:
        # Windows x64 + Linux x64. (macOS and ARM64 targets were dropped.)
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - name: Harden the runner (egress audit)
        # step-security/harden-runner@v2.19.4
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain @master commit
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cargo-auditable
        # SBOM-in-binary: `cargo auditable build` embeds the dependency tree
        # (versions + sources) into a `.dep-v0` section of the shipped binary,
        # so it self-describes and can be audited post-hoc with `cargo audit
        # bin <binary>` even without the source tree. This is a build-wrapper
        # only — it does not change the binary's runtime behavior or add a
        # runtime dependency.
        # taiki-e/install-action@v2.79.10 — reproducible prebuilt-tool install.
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595
        with:
          tool: cargo-auditable

      - name: Cache cargo registry and target
        # Swatinem/rust-cache@v2.9.1
        # zizmor: ignore[cache-poisoning]
        # zizmor's cache-poisoning heuristic is Low-confidence and fires on the
        # mere presence of rust-cache in a tag-triggered job; it does not parse
        # `save-if`. We set `save-if: false` below so this step is RESTORE-ONLY
        # and can never persist a poisoned cache. The residual restore risk is
        # neutralised by `--locked` builds. Annotation documents the disposition.
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: ". -> target"
          key: ${{ matrix.target }}
          # zizmor cache-poisoning remedy: this release job runs on tag pushes
          # (a privileged, artifact-producing context). Restore caches but never
          # SAVE one from here, so a release build can never persist a poisoned
          # cache that a later build would restore. Builds use `--locked` so a
          # cold cache only costs time, not correctness.
          # https://docs.zizmor.sh/audits/#cache-poisoning
          save-if: false

      - name: Install Linux GUI/display build dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libfontconfig1-dev

      - name: Build release binary (with embedded SBOM)
        # `cargo auditable build` is a drop-in wrapper for `cargo build` that
        # embeds the dependency tree into the binary (auditable post-hoc via
        # `cargo audit bin`). Same flags as a plain release build; runtime
        # behavior is unchanged.
        run: cargo auditable build --release --locked --target ${{ matrix.target }} --bin ${{ env.BIN_NAME }}

      - name: Determine version
        id: version
        shell: bash
        # zizmor template-injection remedy: pass workflow context through the
        # `env:` block so the values arrive as shell variables, never as raw
        # `${{ ... }}` text spliced into the script body. See
        # https://docs.zizmor.sh/audits/#template-injection
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        # zizmor template-injection remedy: context values via `env:`, not
        # spliced into the script body.
        env:
          TAG: ${{ steps.version.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          tag="${TAG}"
          target="${TARGET}"
          stage="${BIN_NAME}-${tag}-${target}"
          mkdir -p "dist/${stage}"
          cp "target/${target}/release/${BIN_NAME}" "dist/${stage}/"
          cp LICENSE-MIT LICENSE-APACHE README.md "dist/${stage}/" 2>/dev/null || true
          ( cd dist && tar -czf "${stage}.tar.gz" "${stage}" )
          ( cd dist && shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256" )
          echo "artifact=dist/${stage}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # zizmor template-injection remedy: context values via `env:`, not
        # spliced into the script body.
        env:
          TAG: ${{ steps.version.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:TAG
          $target = $env:TARGET
          $stage = "$env:BIN_NAME-$tag-$target"
          New-Item -ItemType Directory -Force -Path "dist/$stage" | Out-Null
          Copy-Item "target/$target/release/$env:BIN_NAME.exe" "dist/$stage/"
          foreach ($f in @("LICENSE-MIT","LICENSE-APACHE","README.md")) {
            if (Test-Path $f) { Copy-Item $f "dist/$stage/" }
          }
          Compress-Archive -Path "dist/$stage/*" -DestinationPath "dist/$stage.zip" -Force
          $hash = (Get-FileHash "dist/$stage.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $stage.zip" | Out-File -Encoding ascii "dist/$stage.zip.sha256"
          "artifact=dist/$stage.zip" | Out-File -Encoding ascii -Append $env:GITHUB_ENV

      - name: Attest build provenance (SLSA)
        # actions/attest-build-provenance@v4.1.0
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: ${{ env.artifact }}

      - name: Upload build artifacts
        # actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: |
            ./dist/*.tar.gz
            ./dist/*.zip
            ./dist/*.sha256
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # CycloneDX SBOM for the whole workspace, published with the release.
  # --------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden the runner (egress audit)
        # step-security/harden-runner@v2.19.4
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain @master commit
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Install cargo-cyclonedx (version-pinned via cargo install)
        # Pin the SBOM generator to an EXACT version with `--locked` so the SBOM
        # tooling itself is reproducible release-to-release (a moving installer
        # tag could silently change the CycloneDX spec version or output shape).
        # `cargo install --locked` builds from crates.io against the tool's own
        # committed Cargo.lock — no surprise transitive drift.
        run: cargo install cargo-cyclonedx --locked --version 0.5.7

      - name: Generate CycloneDX SBOM
        run: |
          set -euo pipefail
          mkdir -p sbom
          # NOTE: do NOT pass `--override-filename` — it renames output to
          # `<name>.json` (dropping the `.cdx` infix) AND collides all workspace
          # members onto one filename, so the `*.cdx.json` collector below found
          # nothing and the job failed. Default naming writes one
          # `<crate>.cdx.json` per member (c0pl4nd / c0pl4nd-core /
          # c0pl4nd-renderer), which the collector + attest glob match.
          cargo cyclonedx --all --format json
          # cargo-cyclonedx writes per-crate files; collect them.
          find . -name '*.cdx.json' -not -path './target/*' -exec cp {} sbom/ \;
          ls -la sbom
          # Fail loudly if no SBOM was produced (don't ship a release missing it).
          test "$(find sbom -name '*.cdx.json' | wc -l)" -gt 0

      - name: Record toolchain build-provenance (rustc -vV + pin hash)
        # Reproducible-build provenance text artifact. Captures the EXACT compiler
        # identity (`rustc -vV` → version, commit-hash, commit-date, llvm) plus the
        # committed `rust-toolchain.toml` pin and its SHA-256, so a downstream
        # verifier can confirm which toolchain produced a given release. This is
        # the plain-text complement to the SLSA attestation: human-readable, and
        # it survives even when the attestation infra is unavailable.
        run: |
          set -euo pipefail
          mkdir -p sbom
          prov="sbom/BUILD-PROVENANCE.txt"
          {
            echo "C0PL4ND build provenance"
            echo "tag: ${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
            echo "commit: ${GITHUB_SHA}"
            echo "generated-at-utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "=== rustc -vV ==="
            rustc -vV
            echo
            echo "=== cargo --version ==="
            cargo --version
            echo
            echo "=== rust-toolchain.toml (pinned channel) ==="
            if [ -f rust-toolchain.toml ]; then
              cat rust-toolchain.toml
              echo
              echo "rust-toolchain.toml sha256: $(sha256sum rust-toolchain.toml | cut -d' ' -f1)"
            else
              echo "(rust-toolchain.toml not present)"
            fi
          } > "$prov"
          echo "--- ${prov} ---"
          cat "$prov"

      - name: Attest SBOM provenance
        # actions/attest-build-provenance@v4.1.0
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: "sbom/*.cdx.json"

      - name: Upload SBOM + build-provenance artifact
        # actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom
          path: |
            sbom/*.cdx.json
            sbom/BUILD-PROVENANCE.txt
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Brand rasters for the Windows installer — generated on Linux (clean librsvg
  # rasterization) and handed to the Windows packaging job. The Itasha.Corp
  # installer framework (F0RG3-W1R3) owns the branding + NSIS config; only the
  # compiled binary crosses from this repo (binary-input-contract).
  # --------------------------------------------------------------------------
  # --------------------------------------------------------------------------
  # Windows installer — the native Itasha.Corp CRT provisioning-console installer
  # (F0RG3-W1R3, Rust/eframe). Replaces the stock NSIS: the compiled binary +
  # assets are the payload; the installer is brand-themed, per-machine (pre-fills
  # C:\Program Files\Itasha.Corp\C0PL4ND), and reusable across apps. SignPath
  # Foundation signing is gated on SIGNPATH_ORG_ID (unsigned otherwise).
  # --------------------------------------------------------------------------
  windows-installer:
    name: Windows installer (native CRT)
    needs: build
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Checkout C0PL4ND (assets + licenses)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          path: app
          persist-credentials: false
      - name: Checkout installer framework (F0RG3-W1R3)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: 46b-ETYKiAL/Itasha.Corp_F0RG3-W1R3
          path: framework
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - name: Cache cargo + installer target
        # Swatinem/rust-cache@v2.9.1 — restore-only on tag builds (no poisoned save)
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: framework/installer -> target
          key: native-installer
          save-if: false
      - name: Download Windows binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: c0pl4nd-x86_64-pc-windows-msvc
          path: winbin
      - name: Assemble payload (binary + assets + licenses)
        shell: bash
        run: |
          set -euo pipefail
          zip="$(find winbin -name '*.zip' | head -1)"
          [ -n "$zip" ] || { echo "no windows binary zip under winbin/"; exit 1; }
          python -c "import zipfile,sys; zipfile.ZipFile(sys.argv[1]).extractall('winbin/x')" "$zip"
          exe="$(find winbin/x -name 'c0pl4nd.exe' | head -1)"
          [ -n "$exe" ] || { echo "c0pl4nd.exe not found"; exit 1; }
          mkdir -p payload
          cp "$exe" payload/
          if [ -d app/assets ]; then cp -r app/assets payload/assets; fi
          for f in LICENSE-MIT LICENSE-APACHE README.md; do [ -f "app/$f" ] && cp "app/$f" payload/ || true; done
          echo "payload contents:"; find payload -maxdepth 2 | head -40
      - name: Build native installer
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist-out
          python framework/scripts/build_native_installer.py \
            --app c0pl4nd \
            --binary-dir payload \
            --version "$TAG" \
            --out "dist-out/c0pl4nd-${TAG}-x86_64-setup.exe"
          ls -la dist-out
      # --- SignPath Foundation signing (gated; inactive until SIGNPATH_ORG_ID set) ---
      - name: Upload unsigned installer (for SignPath)
        id: unsigned
        if: vars.SIGNPATH_ORG_ID != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: unsigned-installer
          path: dist-out/*.exe
      - name: Sign via SignPath Foundation
        if: vars.SIGNPATH_ORG_ID != ''
        # SignPath/github-action-submit-signing-request@v2
        uses: SignPath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: c0pl4nd
          signing-policy-slug: release-signing
          artifact-configuration-slug: installer
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist-out
      - name: Checksum installer (final, signed-or-unsigned)
        shell: bash
        run: |
          set -euo pipefail
          cd dist-out
          for e in *.exe; do sha256sum "$e" > "$e.sha256"; done
          cat *.sha256
      - name: Attest installer provenance (SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist-out/*.exe
      - name: Upload installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-installer
          path: dist-out/
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [build, sbom, windows-installer]
    runs-on: ubuntu-latest
    permissions:
      # The only job that needs write to create the release + upload assets.
      contents: write
    if: always() && needs.build.result == 'success' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Harden the runner (egress audit)
        # step-security/harden-runner@v2.19.4
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Download all artifacts
        # actions/download-artifact@v4.3.0
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts

      - name: Flatten artifacts + aggregate checksums
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \
            \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.exe' -o -name '*.sha256' -o -name '*.cdx.json' -o -name 'BUILD-PROVENANCE.txt' \) \
            -exec cp {} release/ \;
          ( cd release && cat *.sha256 > SHA256SUMS 2>/dev/null || true )
          ls -la release

      - name: Sign release artifacts (rsign2, when key provisioned)
        # Sign every release asset with minisign (via rsign2 — the same tool the
        # key was generated with; its signatures verify against the embedded key
        # through the app's `minisign-verify` crate). Mirrors the sibling SCR1B3
        # editor's release-signing step verbatim (see SCR1B3 packaging/signing.md)
        # so both Itasha apps share ONE in-app-update signing convention. The
        # in-app updater (Settings → Updates) checks SHA-256 THEN minisign and
        # REFUSES to install anything that fails; each `<asset>` gets a
        # `<asset>.minisig` sibling (the `.sha256` siblings already exist from the
        # build job) and `files: release/*` below uploads them.
        #
        # ACTIVATION (one-time, repo owner): a passwordless rsign2 keypair was
        # generated (`rsign generate -W`); the public half is embedded in
        # `update_engine/verify.rs` and the secret half written to
        # `.s4f3-data/c0pl4nd-minisign-secret.key` (OUTSIDE the repo). Add that
        # secret-key file's CONTENTS as the `MINISIGN_SECRET_KEY` Actions secret.
        # Absent → this step is a NO-OP (artifacts ship checksummed but UNSIGNED;
        # the updater then rejects them — fail-closed). The in-script guard avoids
        # the secrets-in-`if` evaluation gotcha and fails safe.
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            # A stable (non-prerelease) tag has no '-' in its name (e.g. v0.4.6);
            # an rc/pre tag does (v0.4.6-rc.2). Shipping a STABLE release UNSIGNED
            # is a release-readiness landmine: the fail-closed in-app updater
            # rejects unsigned artifacts, so existing users could not auto-update
            # to it — a release that looks successful yet is un-updatable. Fail
            # loudly for stable tags; allow the unsigned path only for prereleases.
            case "${GITHUB_REF_NAME:-}" in
              *-*)
                echo "::warning::MINISIGN_SECRET_KEY not set — shipping checksummed but UNSIGNED prerelease artifacts (auto-update will reject them; acceptable for an rc/pre tag)."
                exit 0
                ;;
              *)
                echo "::error::MINISIGN_SECRET_KEY not set on a STABLE tag (${GITHUB_REF_NAME:-?}). A stable release MUST be signed — the fail-closed in-app updater rejects unsigned artifacts, so existing users could not auto-update to it. Provision the signing key (see this step's comment) or cut a prerelease (-rc/-pre) tag instead. Failing the release."
                exit 1
                ;;
            esac
          fi
          cargo install rsign2 --locked --version "^0.6"
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > sk.key
          count=0
          # Sign every release asset except the signatures themselves (matches the
          # in-app updater, which fetches each archive's `.minisig` sibling).
          while IFS= read -r f; do
            rsign sign -W -s sk.key -x "$f.minisig" "$f"
            count=$((count + 1))
          done < <(find release -type f ! -name '*.minisig')
          shred -u sk.key 2>/dev/null || rm -f sk.key
          echo "signed $count release artifact(s)"
          ls -la release

      - name: Create GitHub Release
        # softprops/action-gh-release@v2.6.2
        # zizmor: ignore[superfluous-actions]
        # Deliberate: this action is SHA-pinned, gives declarative asset globs
        # (`files: release/*`), `generate_release_notes`, and prerelease
        # detection that a hand-rolled `gh release create` script would have to
        # re-implement. The functionality overlaps the runner's `gh` CLI but the
        # ergonomic + auditable surface is worth keeping; no security delta.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release/*
