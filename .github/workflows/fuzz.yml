name: Fuzz Build

# Compiles the cargo-fuzz targets (the VT/ANSI parser + the persisted-state JSON
# loader) on a nightly toolchain so they cannot bitrot. It deliberately does NOT
# run a long fuzzing campaign — fuzzing is an unbounded search and belongs in a
# dedicated/scheduled run, not the per-PR gate. A short smoke run (a few seconds
# per target) catches an immediately-reproducible crash without making the gate
# time-unbounded.
#
# The fuzz crate is its own workspace excluded from the parent (see fuzz/
# Cargo.toml + the root Cargo.toml `[workspace].exclude`), so this is the only
# job that touches nightly + the sanitizer-instrumented build.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz-build:
    name: cargo fuzz build (nightly)
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        # step-security/harden-runner@v2.19.4
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit

      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install nightly Rust toolchain
        # dtolnay/rust-toolchain @master commit (channel selected via toolchain:)
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        # taiki-e/install-action@v2.79.10
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853
        with:
          tool: cargo-fuzz

      - name: Cache cargo registry and fuzz target
        # Swatinem/rust-cache@v2.9.1
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          # The fuzz crate is its own workspace under fuzz/.
          workspaces: "fuzz -> target"
          key: fuzz

      - name: Install Linux build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libfontconfig1-dev

      - name: cargo fuzz build (compile all targets — bitrot guard)
        # Compiles every registered fuzz target with the sanitizer-instrumented
        # nightly build. Failure here means a fuzz target stopped compiling
        # against the current public API of c0pl4nd-core.
        #
        # `+nightly` is REQUIRED: cargo-fuzz passes `-Zsanitizer=address` which
        # only the nightly compiler accepts. The toolchain step installs nightly
        # but does not make it the default (the repo `rust-toolchain.toml` pins
        # stable), so the channel is selected explicitly here — the `+nightly`
        # rustup proxy exports `RUSTUP_TOOLCHAIN=nightly`, which propagates to
        # the inner `cargo build` that cargo-fuzz spawns.
        #
        # `--target x86_64-unknown-linux-gnu` is REQUIRED: `taiki-e/install-action`
        # installs a *musl-static* `cargo-fuzz` binary, and cargo-fuzz defaults
        # the fuzz `--target` to its own triple (`x86_64-unknown-linux-musl`).
        # AddressSanitizer is incompatible with a statically-linked libc
        # ("sanitizer is incompatible with statically linked libc" +
        # "can't find crate for `core`"), so the musl default cannot link. The
        # gnu target is the runner's host triple (always installed with nightly)
        # and is where ASAN is supported.
        env:
          FUZZ_TARGET_TRIPLE: x86_64-unknown-linux-gnu
        run: cargo +nightly fuzz build --target "${FUZZ_TARGET_TRIPLE}"

      - name: cargo fuzz smoke run (a few seconds per target)
        # A short, bounded run per target: catches an immediately-reproducible
        # crash on the empty/seed corpus without making the gate time-unbounded.
        # Same gnu-target pin as the build step (see its comment for why).
        env:
          FUZZ_TARGET_TRIPLE: x86_64-unknown-linux-gnu
        run: |
          set -euo pipefail
          for target in $(cargo +nightly fuzz list); do
            echo "== smoke fuzzing ${target} for 10s =="
            cargo +nightly fuzz run --target "${FUZZ_TARGET_TRIPLE}" "${target}" \
              -- -max_total_time=10 -runs=200000
          done

  # Aggregating gate so a skipped/cancelled build cannot pass as a required check.
  fuzz-gate:
    name: Fuzz Gate
    runs-on: ubuntu-latest
    needs: [fuzz-build]
    if: always()
    steps:
      - name: Verify the fuzz build succeeded
        run: |
          set -euo pipefail
          result="${{ needs.fuzz-build.result }}"
          echo "fuzz-build = ${result}"
          if [ "${result}" != "success" ]; then
            echo "::error::cargo fuzz build did not succeed (result=${result})."
            exit 1
          fi
          echo "Fuzz targets compile and pass the smoke run."
