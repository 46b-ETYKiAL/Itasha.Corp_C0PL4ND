name: Fuzz

# Continuous fuzzing of the VT / ANSI / OSC escape-sequence parser — the
# highest-value untrusted-input surface in a terminal emulator. cargo-fuzz
# requires a nightly toolchain (libFuzzer relies on LLVM sanitizer
# instrumentation that is not stabilized). This job is intentionally NOT a
# required merge-queue check: it builds the target on every relevant push
# (a regression that breaks the fuzz harness is caught), and runs a short
# time-boxed campaign on a schedule + on demand. Longer continuous fuzzing is
# delegated to OSS-Fuzz once the project is accepted (see SECURITY.md).
#
# All third-party actions pinned by full commit SHA (version noted alongside).

on:
  push:
    branches: [main, master]
    paths:
      - "crates/core/**"
      - "fuzz/**"
      - ".github/workflows/fuzz.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "crates/core/**"
      - "fuzz/**"
      - ".github/workflows/fuzz.yml"
  schedule:
    # Nightly short campaign at 04:17 UTC.
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      duration_secs:
        description: "Fuzz campaign duration in seconds"
        required: false
        default: "300"

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: Build & run fuzz target (vt_parser)
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        # step-security/harden-runner@v2.19.4
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install nightly Rust toolchain
        # dtolnay/rust-toolchain @master commit (channel selected via toolchain:)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        # taiki-e/install-action@v2.79.10 — reproducible prebuilt-tool install.
        uses: taiki-e/install-action@15413b256f995d819248ea62704771a959284285
        with:
          tool: cargo-fuzz

      - name: Cache cargo registry and target
        # Swatinem/rust-cache@v2.9.1
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: "fuzz -> target"
          key: fuzz

      - name: Build the fuzz target (regression smoke)
        run: cargo +nightly fuzz build vt_parser

      - name: Run a short fuzz campaign
        # PRs/pushes: 60s smoke. Scheduled/dispatch: the requested duration
        # (default 300s). A crash makes the step (and the job) fail.
        run: |
          set -euo pipefail
          DURATION="${{ github.event.inputs.duration_secs || '60' }}"
          if [ "${{ github.event_name }}" = "schedule" ]; then DURATION=300; fi
          echo "Fuzzing vt_parser for ${DURATION}s"
          cargo +nightly fuzz run vt_parser -- -max_total_time="${DURATION}" -rss_limit_mb=4096

      - name: Upload crash artifacts on failure
        if: failure()
        # actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: fuzz-crashes
          path: |
            fuzz/artifacts/**
            fuzz/corpus/**
          if-no-files-found: ignore
