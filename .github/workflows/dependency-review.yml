name: Dependency Review

# Blocks PRs that introduce vulnerable or disallowed-license dependencies
# BEFORE they merge. Reads the Cargo.lock diff against the base branch using
# the GitHub dependency graph. Free for public repos. Complements cargo-deny
# (which runs against the full tree on every push); this is the per-PR delta gate.

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Allows the action to post a summary comment on the PR.
      pull-requests: write
    steps:
      - name: Harden the runner (egress audit)
        # step-security/harden-runner@v2.19.4
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Dependency Review
        # actions/dependency-review-action@v5.0.0
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          # Fail the PR on any moderate-or-higher advisory.
          fail-on-severity: moderate
          comment-summary-in-pr: always
          # Keep the license allow-list in lockstep with deny.toml. OFL-1.1 +
          # Ubuntu-font-1.0 cover egui's bundled default fonts
          # (`epaint_default_fonts`); both are permissive OSI/FSF font licenses
          # that allow embedding + redistribution in software.
          allow-licenses: >-
            MIT, Apache-2.0, Apache-2.0 WITH LLVM-exception, BSD-2-Clause,
            BSD-3-Clause, ISC, Zlib, Unicode-3.0, Unicode-DFS-2016, MPL-2.0,
            CC0-1.0, BSL-1.0, CDLA-Permissive-2.0, OFL-1.1, Ubuntu-font-1.0
          # `filetime` (pulled in by `tar` for the in-app updater's archive
          # extraction) declares its license with the DEPRECATED `MIT/Apache-2.0`
          # SPDX slash syntax, which this action mis-parses as the non-SPDX
          # `LicenseRef-bad-mitapache-2.0` and rejects. Both halves (MIT,
          # Apache-2.0) are in the allow-list above, and cargo-deny (which parses
          # the slash form correctly) accepts it — so exempt this one package from
          # the action's license check. NOT a real license issue; a parser quirk.
          # libfuzzer-sys bundles the LLVM libFuzzer runtime, so its SPDX is
          # `(MIT OR Apache-2.0) AND NCSA` — the NCSA term (a permissive
          # BSD-style license used by LLVM) isn't worth adding tree-wide; exempt
          # the fuzz-only dev dependency. Not shipped in any release binary.
          # `generator` (pulled in by the `loom` concurrency-test dev-dependency)
          # has the SAME deprecated `MIT/Apache-2.0` slash-syntax quirk as
          # `filetime` above — mis-parsed as `LicenseRef-bad-mitapache-2.0`. Both
          # halves are in the allow-list; it is a `#[cfg(loom)]`-only dev dep
          # never compiled into a release binary. Parser quirk, not a real issue.
          allow-dependencies-licenses: pkg:cargo/filetime@0.2.29, pkg:cargo/libfuzzer-sys@0.4.10, pkg:cargo/generator@0.8.9
