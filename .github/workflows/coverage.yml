name: Coverage

# Line/region coverage of the deterministic core engine (the VT parser, grid,
# config, theming, layout). Measured with cargo-llvm-cov and GATED with
# `--fail-under-lines` so coverage cannot silently regress. Scoped to
# `c0pl4nd-core` on purpose: it is GPU-free and deterministic, so the number is
# stable in CI. The egui shell's behaviour is covered by the headed
# egui_kittest interaction tests in `crates/app/tests` (which need a display and
# are validated by the Build & Test matrix), not by this coverage gate.

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    # NOTE: job name kept byte-stable (NOT renamed to track the threshold) so it
    # cannot orphan a required status check bound to this name; the enforced
    # threshold is --fail-under-lines below (now 93). See merge-queue-check-gating.
    name: Core line coverage (>= 88%)
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5

      - name: Install Rust toolchain (+ llvm-tools)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.79.10
        with:
          tool: cargo-llvm-cov


      # The gate. The coverage initiative raised core line coverage to ~96.9%
      # (measured local Windows; the remaining misses are un-inducible PTY/IO
      # error arms + per-platform cfg branches). Ratcheted 88 -> 93 to lock in
      # the gain while leaving ~4pp headroom for platform variance (the CI run
      # is Linux, where Windows-ConPTY-only arms do not compile) and a real
      # regression. Also emits an LCOV artifact for inspection.
      - name: Measure + gate core coverage
        run: |
          cargo llvm-cov -p c0pl4nd-core --lcov --output-path lcov.info --fail-under-lines 93
          cargo llvm-cov -p c0pl4nd-core --summary-only

      - name: Upload LCOV report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: ignore

  # Per-file coverage gate for the W1TN3SS reporting INTEGRATION module
  # (crates/app/src/reporting.rs). Distinct from the core gate above: the
  # reporting glue lives in the `c0pl4nd` BIN (the app crate also holds the
  # display-gated egui shell, deliberately excluded), so we gate the one file via
  # scripts/coverage-reporting.sh (llvm-cov JSON + a per-file line-% floor). The
  # job NAME is independent of the floor value so it cannot orphan a required
  # status check; the enforced floor is REPORTING_COVERAGE_FLOOR below.
  reporting-coverage:
    name: W1TN3SS reporting-integration coverage
    runs-on: ubuntu-latest
    env:
      REPORTING_COVERAGE_FLOOR: "95"
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5

      - name: Install Rust toolchain (+ llvm-tools)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.79.10
        with:
          tool: cargo-llvm-cov

      - name: Gate reporting-integration line coverage (>= 95%)
        run: bash scripts/coverage-reporting.sh


  # Per-OS coverage REPORT + GATE (audit #4). The Linux job above stays the
  # primary gate (byte-stable name, threshold 93). These make the OTHER
  # platforms' coverage legible + gated: the same core crate reads LOWER on
  # Windows because the #[cfg(windows)] ConPTY/IO error arms compile + are
  # counted there (they don't compile on Linux). Honest per-OS floors.
  coverage-windows:
    name: Core line coverage (windows)
    runs-on: windows-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5
      - name: Install Rust toolchain (+ llvm-tools)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.79.10
        with:
          tool: cargo-llvm-cov
      - name: Measure + gate core coverage (windows)
        run: |
          cargo llvm-cov -p c0pl4nd-core --lcov --output-path lcov-windows.info --fail-under-lines 78
          cargo llvm-cov -p c0pl4nd-core --summary-only
      - name: Upload LCOV report (windows)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov-windows
          path: lcov-windows.info
          if-no-files-found: ignore

  coverage-macos:
    name: Core line coverage (macos)
    runs-on: macos-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5
      - name: Install Rust toolchain (+ llvm-tools)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.79.10
        with:
          tool: cargo-llvm-cov
      - name: Measure + gate core coverage (macos)
        run: |
          cargo llvm-cov -p c0pl4nd-core --lcov --output-path lcov-macos.info --fail-under-lines 88
          cargo llvm-cov -p c0pl4nd-core --summary-only
      - name: Upload LCOV report (macos)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov-macos
          path: lcov-macos.info
          if-no-files-found: ignore
