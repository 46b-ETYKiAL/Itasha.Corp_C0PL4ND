<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="C0PL4ND — a cross-platform GPU terminal with split-tree multiplexing, the operator's shell into the wired">
  <defs>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="1280" height="4">
      <rect width="1280" height="2" fill="transparent"/><rect y="2" width="1280" height="2" fill="rgba(0,0,0,0.16)"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="48%" r="72%">
      <stop offset="0%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,0.46)"/>
    </radialGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00fffe" stop-opacity="0"/><stop offset="100%" stop-color="#00fffe" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="phos"><feGaussianBlur in="SourceGraphic" stdDeviation="0.7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="2.4"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="sc"><rect x="28" y="22" width="1224" height="668" rx="6"/></clipPath>
  </defs>
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace; }
    @keyframes sweep { 0% { transform: translateY(0); } 100% { transform: translateY(668px); } }
    @keyframes flicker { 0%,96%,100% { opacity: 1; } 97% { opacity: 0.97; } 98% { opacity: 0.995; } }
    @keyframes bootReveal { 0% { opacity: 0; } 100% { opacity: 0.92; } }
    @keyframes curBlink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
    @keyframes heartbeat { 0%,100% { r: 4; opacity: 0.55; } 15% { r: 5; opacity: 0.95; } 30% { r: 4; opacity: 0.55; } 50% { r: 4.4; opacity: 0.8; } }
    @keyframes edgeGlow { 0% { stroke-dashoffset: 3784; } 100% { stroke-dashoffset: 0; } }
    @keyframes phosphorBloom { 0%,100% { opacity: 0; } 50% { opacity: 0.02; } }
    @keyframes signalPulse { 0% { stroke-dashoffset: 18; opacity: 0.85; } 100% { stroke-dashoffset: 0; opacity: 0.3; } }
    @keyframes nodeBlink { 0%,100% { opacity: 0.9; } 50% { opacity: 0.35; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <rect x="0" y="0" width="1280" height="720" rx="14" fill="#111118"/>
  <rect x="2" y="2" width="1276" height="716" rx="13" fill="#18181f" stroke="#2a2833" stroke-width="1"/>
  <line x1="24" y1="13" x2="1256" y2="13" stroke="#2a2833" stroke-width="0.5"/>
  <line x1="24" y1="700" x2="1256" y2="700" stroke="#2a2833" stroke-width="0.5"/>
  <rect x="28" y="22" width="1224" height="668" rx="6" fill="#08060d"/>

  <g clip-path="url(#sc)">
    <g stroke="url(#grid)" stroke-width="0.6" opacity="0.5">
      <line x1="640" y1="470" x2="30" y2="688"/><line x1="640" y1="470" x2="200" y2="688"/>
      <line x1="640" y1="470" x2="380" y2="688"/><line x1="640" y1="470" x2="520" y2="688"/>
      <line x1="640" y1="470" x2="640" y2="688"/><line x1="640" y1="470" x2="760" y2="688"/>
      <line x1="640" y1="470" x2="900" y2="688"/><line x1="640" y1="470" x2="1080" y2="688"/>
      <line x1="640" y1="470" x2="1250" y2="688"/>
    </g>
    <g stroke="#00fffe" stroke-width="0.5" opacity="0.22">
      <line x1="120" y1="560" x2="1160" y2="560"/><line x1="80" y1="612" x2="1200" y2="612"/><line x1="48" y1="664" x2="1232" y2="664"/>
    </g>
    <rect x="28" y="22" width="1224" height="3" fill="#00fffe" opacity="0.05" style="animation: sweep 9s linear infinite;"/>
    <rect x="28" y="22" width="1224" height="668" fill="#ffffff" opacity="0" style="animation: phosphorBloom 8s ease-in-out infinite;"/>
  </g>
  <rect x="28" y="22" width="1224" height="668" rx="6" fill="url(#scan)"/>
  <rect x="28" y="22" width="1224" height="668" rx="6" fill="url(#vig)"/>
  <rect x="28" y="22" width="1224" height="668" rx="6" fill="none" stroke="#00fffe" stroke-width="1" opacity="0.07" stroke-dasharray="22,3762" style="animation: edgeGlow 11s linear infinite;"/>
  <rect x="28" y="22" width="1224" height="668" rx="6" fill="none" stroke="#1a1825"/>

  <g stroke="#00fffe" stroke-width="1.4" fill="none" opacity="0.6">
    <path d="M56 54 h26 M56 54 v26"/><path d="M1224 54 h-26 M1224 54 v26"/>
    <path d="M56 658 h26 M56 658 v-26"/><path d="M1224 658 h-26 M1224 658 v-26"/>
  </g>

  <g style="animation: flicker 7s infinite;">
    <text x="640" y="78" text-anchor="middle" font-size="13" fill="#5a5869" letter-spacing="7" filter="url(#phos)">I T A S H A . C O R P</text>
    <g font-size="62" font-weight="bold" letter-spacing="9" text-anchor="middle">
      <text x="643" y="148" fill="#ff2d78" opacity="0.55" filter="url(#soft)">C0PL4ND</text>
      <text x="637" y="148" fill="#00fffe" opacity="0.55" filter="url(#soft)">C0PL4ND</text>
      <text x="640" y="148" fill="#e9f7ff" filter="url(#glow)">C0PL4ND</text>
    </g>
    <text x="640" y="182" text-anchor="middle" font-size="14" fill="#a020ff" letter-spacing="4" filter="url(#phos)">the operator's shell into the wired · GPU-rendered · split-tree multiplexed</text>

    <g filter="url(#phos)">
      <text x="64" y="244" font-size="12" fill="#5a5869">c0pl4nd.init ──────────────────────────────</text>
      <text x="84" y="280" font-size="12.5" fill="#00fffe" style="animation: bootReveal 0.35s ease-out 0.2s both;">&gt; pty.spawn(shell)</text>
      <text x="544" y="280" font-size="12.5" fill="#01fe36" style="animation: bootReveal 0.35s ease-out 0.2s both;">[ OK ]</text>
      <text x="84" y="316" font-size="12.5" fill="#00fffe" style="animation: bootReveal 0.35s ease-out 0.5s both;">&gt; vt.parser · scrollback · search</text>
      <text x="544" y="316" font-size="12.5" fill="#01fe36" style="animation: bootReveal 0.35s ease-out 0.5s both;">[ OK ]</text>
      <text x="84" y="352" font-size="12.5" fill="#00fffe" style="animation: bootReveal 0.35s ease-out 0.8s both;">&gt; gpu.surface.bind(wgpu)</text>
      <text x="544" y="352" font-size="12.5" fill="#01fe36" style="animation: bootReveal 0.35s ease-out 0.8s both;">[ OK ]</text>
      <text x="84" y="388" font-size="12.5" fill="#00fffe" style="animation: bootReveal 0.35s ease-out 1.1s both;">&gt; split-tree · tabs · nested tabs</text>
      <text x="544" y="388" font-size="12.5" fill="#01fe36" style="animation: bootReveal 0.35s ease-out 1.1s both;">[ OK ]</text>
      <text x="84" y="424" font-size="12.5" fill="#00fffe" style="animation: bootReveal 0.35s ease-out 1.4s both;">&gt; sixel + kitty image decode</text>
      <text x="544" y="424" font-size="12.5" fill="#01fe36" style="animation: bootReveal 0.35s ease-out 1.4s both;">[ OK ]</text>
      <text x="64" y="458" font-size="12" fill="#5a5869">────────────────────────────────────────────</text>
      <text x="64" y="498" font-size="13" fill="#01fe36">operator@wired:~$</text>
      <rect x="228" y="486" width="11" height="16" fill="#00fffe" style="animation: curBlink 1.1s step-end infinite;"/>
      <text x="64" y="536" font-size="11" fill="#5a5869" letter-spacing="2">present day · present time</text>
    </g>

    <g transform="translate(854, 238) scale(1.18)" style="animation: flicker 9s infinite;">
      <text x="86" y="184" fill="#a020ff" font-size="50" opacity="0.14" font-family="'Noto Sans JP','Yu Gothic',sans-serif">配線</text>

      <rect x="0" y="0" width="248" height="200" rx="4" fill="none" stroke="#00fffe" stroke-width="1.1" opacity="0.55" filter="url(#phos)"/>

      <line x1="124" y1="6" x2="124" y2="194" stroke="#00fffe" stroke-width="0.7" opacity="0.45"/>
      <line x1="6" y1="100" x2="124" y2="100" stroke="#00fffe" stroke-width="0.7" opacity="0.45"/>
      <line x1="124" y1="120" x2="242" y2="120" stroke="#00fffe" stroke-width="0.7" opacity="0.45"/>

      <g filter="url(#phos)">
        <rect x="10" y="10" width="14" height="4" rx="1" fill="#00fffe" opacity="0.55"/>
        <text x="30" y="14" font-size="6.5" fill="#5a5869" letter-spacing="0.6">pane 0 · zsh</text>
        <text x="10" y="34" font-size="8" fill="#00fffe" letter-spacing="0.6">~ $ ls -la</text>
        <text x="10" y="48" font-size="7.5" fill="#5a5869" opacity="0.8">drwxr.. forge/</text>
        <text x="10" y="60" font-size="7.5" fill="#5a5869" opacity="0.8">drwxr.. wire/</text>
        <text x="10" y="74" font-size="7.5" fill="#5a5869" opacity="0.8">-rwx-. README</text>
        <text x="10" y="88" font-size="8" fill="#01fe36" letter-spacing="0.6">~ $</text>
        <rect x="22" y="80" width="5" height="9" fill="#00fffe" style="animation: curBlink 1.1s step-end infinite;"/>
      </g>

      <g filter="url(#phos)">
        <rect x="10" y="106" width="14" height="4" rx="1" fill="#ff2d78" opacity="0.55"/>
        <text x="30" y="110" font-size="6.5" fill="#5a5869" letter-spacing="0.6">pane 1 · btm</text>
        <rect x="10" y="118" width="108" height="6" fill="none" stroke="#5a5869" stroke-width="0.5" opacity="0.7"/>
        <rect x="10" y="118" width="74" height="6" fill="#ff2d78" opacity="0.45"/>
        <text x="10" y="138" font-size="6.5" fill="#5a5869">CPU 58%</text>
        <rect x="10" y="142" width="108" height="6" fill="none" stroke="#5a5869" stroke-width="0.5" opacity="0.7"/>
        <rect x="10" y="142" width="44" height="6" fill="#a020ff" opacity="0.45"/>
        <text x="10" y="162" font-size="6.5" fill="#5a5869">MEM 34%</text>
        <text x="10" y="184" font-size="6.5" fill="#01fe36" opacity="0.9">[ live ]</text>
      </g>

      <g filter="url(#phos)">
        <rect x="130" y="10" width="14" height="4" rx="1" fill="#a020ff" opacity="0.55"/>
        <text x="150" y="14" font-size="6.5" fill="#5a5869" letter-spacing="0.6">pane 2 · log</text>
        <text x="130" y="34" font-size="7.5" fill="#a020ff" opacity="0.85">[INFO] gpu.bind</text>
        <text x="130" y="48" font-size="7.5" fill="#a020ff" opacity="0.85">[INFO] vt.parse</text>
        <text x="130" y="62" font-size="7.5" fill="#a020ff" opacity="0.85">[ OK ] scroll 8k</text>
        <text x="130" y="76" font-size="7.5" fill="#01fe36" opacity="0.9">[ OK ] sixel.decode</text>
        <text x="130" y="90" font-size="7.5" fill="#01fe36" opacity="0.9">[ OK ] kitty.img</text>
        <text x="130" y="104" font-size="7.5" fill="#5a5869" opacity="0.7">tailing...</text>
      </g>

      <g filter="url(#phos)">
        <rect x="130" y="126" width="14" height="4" rx="1" fill="#01fe36" opacity="0.55"/>
        <text x="150" y="130" font-size="6.5" fill="#5a5869" letter-spacing="0.6">pane 3 · img</text>
        <rect x="130" y="138" width="108" height="48" rx="1.5" fill="none" stroke="#01fe36" stroke-width="0.6" opacity="0.55"/>
        <g opacity="0.7" stroke="#01fe36" stroke-width="0.7" fill="none">
          <circle cx="158" cy="162" r="10"/>
          <line x1="148" y1="162" x2="168" y2="162"/>
          <line x1="158" y1="152" x2="158" y2="172"/>
          <path d="M150 158 q8 -6 16 0 q-8 6 -16 0"/>
          <path d="M150 166 q8 -6 16 0 q-8 6 -16 0"/>
        </g>
        <g transform="translate(180, 144)">
          <rect x="0" y="0" width="50" height="8" fill="#01fe36" opacity="0.25"/>
          <rect x="0" y="12" width="40" height="3" fill="#5a5869" opacity="0.6"/>
          <rect x="0" y="18" width="46" height="3" fill="#5a5869" opacity="0.6"/>
          <rect x="0" y="24" width="32" height="3" fill="#5a5869" opacity="0.6"/>
          <rect x="0" y="30" width="44" height="3" fill="#5a5869" opacity="0.6"/>
        </g>
      </g>

      <g transform="translate(122, -2)">
        <rect x="-22" y="0" width="44" height="9" rx="2" fill="#08060d" stroke="#a020ff" stroke-width="0.6" opacity="0.7"/>
        <circle cx="-14" cy="4.5" r="1.5" fill="#01fe36" opacity="0.9" style="animation: nodeBlink 2s ease-in-out infinite;"/>
        <text x="-6" y="7.2" font-size="6" fill="#5a5869" letter-spacing="0.8">SPLIT-TREE</text>
      </g>
    </g>
  </g>

  <g>
    <circle cx="56" cy="707" r="3.5" fill="#01fe36" opacity="0.7" style="animation: heartbeat 2.4s ease-in-out infinite;"/>
    <circle cx="71" cy="707" r="3" fill="#00fffe" opacity="0.45"/>
    <circle cx="86" cy="707" r="3" fill="#5a5869" opacity="0.3"/>
    <text x="108" y="707" font-size="9" fill="#3a3848" letter-spacing="3.2" dominant-baseline="central">ITASHA.CORP</text>
    <text x="232" y="707" font-size="9" fill="#2c2a37" dominant-baseline="central">·</text>
    <text x="246" y="707" font-size="9" fill="#3a3848" letter-spacing="2.4" dominant-baseline="central">WIRED-SHELL · CRT-IC v1</text>
    <text x="1208" y="707" font-size="9" fill="#3a3848" letter-spacing="2.4" dominant-baseline="central" text-anchor="end">CRT-IC // C0PL4ND</text>
    <circle cx="1224" cy="707" r="4" fill="#01fe36" opacity="0.5"/>
    <circle cx="1224" cy="707" r="2" fill="#01fe36" opacity="0.95" style="animation: heartbeat 2.4s ease-in-out infinite;"/>
  </g>
</svg>
