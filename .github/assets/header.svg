<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 549" width="1280" height="549" role="img" aria-label="C0PL4ND — a cross-platform GPU terminal with split-tree multiplexing, the operator's shell into the wired">
  <defs>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="1280" height="4">
      <rect width="1280" height="2" fill="transparent"/><rect y="2" width="1280" height="2" fill="rgba(0,0,0,0.16)"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="48%" r="72%">
      <stop offset="0%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,0.5)"/>
    </radialGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B48CE8" stop-opacity="0"/><stop offset="100%" stop-color="#B48CE8" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="phos"><feGaussianBlur in="SourceGraphic" stdDeviation="0.7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="2.4"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="sc"><rect x="28" y="22" width="1224" height="501" rx="6"/></clipPath>
    <radialGradient id="glass" cx="36%" cy="22%" r="62%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/><stop offset="55%" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
    <pattern id="phosmask" width="3" height="1" patternUnits="userSpaceOnUse"><rect width="1" height="1" x="0" fill="#ff2a2a"/><rect width="1" height="1" x="1" fill="#2aff2a"/><rect width="1" height="1" x="2" fill="#2a2aff"/></pattern>
  </defs>
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace; }
    @keyframes sweep { 0% { transform: translateY(0); } 100% { transform: translateY(501px); } }
    @keyframes flicker { 0%,96%,100% { opacity: 1; } 97% { opacity: 0.97; } 98% { opacity: 0.995; } }
    @keyframes bootReveal { 0% { opacity: 0; } 100% { opacity: 0.92; } }
    @keyframes curBlink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
    @keyframes heartbeat { 0%,100% { transform: scale(1); opacity: 0.55; } 15% { transform: scale(1.3); opacity: 0.95; } 30% { transform: scale(1); opacity: 0.55; } 50% { transform: scale(1.1); opacity: 0.8; } }
    @keyframes edgeGlow { 0% { stroke-dashoffset: 3450; } 100% { stroke-dashoffset: 0; } }
    @keyframes phosphorBloom { 0%,100% { opacity: 0; } 50% { opacity: 0.02; } }
    @keyframes nodeBlink { 0%,100% { opacity: 0.9; } 50% { opacity: 0.35; } }
    @keyframes kanjiPulse { 0%,100% { opacity: 0.1; } 50% { opacity: 0.2; } }
    @keyframes rollBar { 0% { transform: translateY(-70px); } 100% { transform: translateY(540px); } }
    @keyframes dataBlink { 0%,100% { opacity: 0.12; } 50% { opacity: 0.7; } }
    @keyframes titleGlitch { 0%,90%,100% { transform: translate(0,0); } 91% { transform: translate(-2px,1px); } 94% { transform: translate(2px,-1px); } 97% { transform: translate(-1px,0); } }
    @keyframes paneFocus { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes paneRing { 0%,18%,100% { opacity: 0; } 6% { opacity: 0.5; } }
    @keyframes liveBlink { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes okPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes linePulse { 0%,100% { opacity: 0.8; } 50% { opacity: 1; } }
    @keyframes titleBreathe { 0%,100% { opacity: 1; } 50% { opacity: 0.85; } }
    @keyframes crtBlank { 0%,90% { opacity: 0; } 91.5% { opacity: 1; } 97% { opacity: 1; } 98.6% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes crtLine { 0%,89.5% { opacity: 0; transform: scaleY(1); } 90.4% { opacity: 0.95; transform: scaleY(0.03); } 91.4% { opacity: 0; transform: scaleY(0.01); } 97.4% { opacity: 0; transform: scaleY(0.02); } 98.2% { opacity: 0.95; transform: scaleY(0.08); } 99.2% { opacity: 0; transform: scaleY(1); } 100% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <rect x="0" y="0" width="1280" height="549" rx="14" fill="#0b0f12"/>
  <rect x="2" y="2" width="1276" height="545" rx="13" fill="#1a242b" stroke="#2a3a42" stroke-width="1"/>
  <line x1="24" y1="13" x2="1256" y2="13" stroke="#2a3a42" stroke-width="0.5"/>
  <line x1="24" y1="529" x2="1256" y2="529" stroke="#2a3a42" stroke-width="0.5"/>
  <rect x="28" y="22" width="1224" height="501" rx="6" fill="#070a0c"/>

  <g clip-path="url(#sc)">
    <g stroke="url(#grid)" stroke-width="0.6" opacity="0.5">
      <line x1="640" y1="372" x2="40" y2="523"/><line x1="640" y1="372" x2="220" y2="523"/>
      <line x1="640" y1="372" x2="400" y2="523"/><line x1="640" y1="372" x2="540" y2="523"/>
      <line x1="640" y1="372" x2="640" y2="523"/><line x1="640" y1="372" x2="740" y2="523"/>
      <line x1="640" y1="372" x2="900" y2="523"/><line x1="640" y1="372" x2="1060" y2="523"/>
      <line x1="640" y1="372" x2="1240" y2="523"/>
    </g>
    <g stroke="#B48CE8" stroke-width="0.5" opacity="0.2">
      <line x1="120" y1="430" x2="1160" y2="430"/><line x1="80" y1="476" x2="1200" y2="476"/><line x1="48" y1="514" x2="1232" y2="514"/>
    </g>
    <!-- "the wired" data nodes -->
    <g fill="#B48CE8">
      <circle cx="360" cy="470" r="1.6" style="animation: dataBlink 2.6s ease-in-out 0s infinite;"/>
      <circle cx="700" cy="502" r="1.6" style="animation: dataBlink 3.1s ease-in-out 0.8s infinite;"/>
      <circle cx="980" cy="452" r="1.6" style="animation: dataBlink 2.4s ease-in-out 1.4s infinite;"/>
      <circle cx="498" cy="510" r="1.6" fill="#5050ff" style="animation: dataBlink 3.4s ease-in-out 2s infinite;"/>
    </g>
    <!-- CRT roll bar -->
    <rect x="28" y="22" width="1224" height="46" fill="#cdb6ee" opacity="0.035" style="animation: rollBar 7s linear infinite;"/>
    <rect x="28" y="22" width="1224" height="3" fill="#B48CE8" opacity="0.05" style="animation: sweep 9s linear infinite;"/>
    <rect x="28" y="22" width="1224" height="501" fill="#ffffff" opacity="0" style="animation: phosphorBloom 8s ease-in-out infinite;"/>
  </g>
  <rect x="28" y="22" width="1224" height="501" rx="6" fill="url(#scan)"/>
  <rect x="28" y="22" width="1224" height="501" rx="6" fill="url(#vig)"/>
  <rect x="28" y="22" width="1224" height="501" rx="6" fill="url(#phosmask)" opacity="0.04"/>
  <rect x="28" y="22" width="1224" height="501" rx="6" fill="url(#glass)"/>
  <rect x="28" y="22" width="1224" height="501" rx="6" fill="none" stroke="#B48CE8" stroke-width="1" opacity="0.07" stroke-dasharray="22,3428" style="animation: edgeGlow 11s linear infinite;"/>
  <rect x="28" y="22" width="1224" height="501" rx="6" fill="none" stroke="#1a242b"/>

  <g stroke="#B48CE8" stroke-width="1.4" fill="none" opacity="0.55">
    <path d="M56 54 h26 M56 54 v26"/><path d="M1224 54 h-26 M1224 54 v26"/>
    <path d="M56 491 h26 M56 491 v-26"/><path d="M1224 491 h-26 M1224 491 v-26"/>
  </g>

    <text x="1204" y="98" text-anchor="end" font-size="40" fill="#8c6cd0" opacity="0.13" font-family="'Noto Sans JP','Yu Gothic','Hiragino Sans',sans-serif" style="animation: kanjiPulse 6s ease-in-out infinite;">配線</text>
  <g style="animation: flicker 7s infinite;">
    <text x="640" y="74" text-anchor="middle" font-size="13" fill="#5a6b73" letter-spacing="7" filter="url(#phos)" style="font-family: 'Times New Roman','Times','Matisse',serif; font-weight: 700; transform: scaleX(0.82); transform-origin: 640px 74px; animation: titleBreathe 6s ease-in-out infinite;">I T A S H A . C O R P</text>
    <g font-size="62" font-weight="bold" letter-spacing="9" text-anchor="middle">
      <text x="643" y="140" fill="#8c6cd0" opacity="0.5" filter="url(#soft)" style="animation: titleGlitch 5.5s steps(1) infinite; transform-origin: 640px 140px;">C0PL4ND</text>
      <text x="637" y="140" fill="#B48CE8" opacity="0.5" filter="url(#soft)" style="animation: titleGlitch 6.3s steps(1) 0.1s infinite; transform-origin: 640px 140px;">C0PL4ND</text>
      <text x="640" y="140" fill="#e9f7ff" filter="url(#glow)" style="animation: titleBreathe 4s ease-in-out infinite;">C0PL4ND</text>
    </g>
    <text x="640" y="172" text-anchor="middle" font-size="14" fill="#8c6cd0" letter-spacing="3" filter="url(#phos)">the operator's shell into the wired · GPU-rendered · split-tree multiplexed</text>

    <g filter="url(#phos)">
      <text x="64" y="222" font-size="12" fill="#5a6b73">c0pl4nd.init ──────────────────────────────</text>
      <text x="84" y="250" font-size="12.5" fill="#B48CE8" style="animation: bootReveal 0.35s ease-out 0.2s both;, linePulse 3.6s ease-in-out 0.0s infinite">&gt; pty.spawn(shell) · conpty · unix</text>
      <text x="544" y="250" font-size="12.5" fill="#6fb89a" style="animation: bootReveal 0.35s ease-out 0.2s both, okPulse 2s ease-in-out 0.6s infinite;">[ OK ]</text>
      <text x="84" y="276" font-size="12.5" fill="#B48CE8" style="animation: bootReveal 0.35s ease-out 0.5s both;, linePulse 3.6s ease-in-out 0.4s infinite">&gt; vt.parser · scrollback · search</text>
      <text x="544" y="276" font-size="12.5" fill="#6fb89a" style="animation: bootReveal 0.35s ease-out 0.5s both, okPulse 2s ease-in-out 1.0s infinite;">[ OK ]</text>
      <text x="84" y="302" font-size="12.5" fill="#B48CE8" style="animation: bootReveal 0.35s ease-out 0.8s both;, linePulse 3.6s ease-in-out 0.8s infinite">&gt; gpu.surface.bind(wgpu) · glyph-atlas</text>
      <text x="544" y="302" font-size="12.5" fill="#6fb89a" style="animation: bootReveal 0.35s ease-out 0.8s both, okPulse 2s ease-in-out 1.4s infinite;">[ OK ]</text>
      <text x="84" y="328" font-size="12.5" fill="#B48CE8" style="animation: bootReveal 0.35s ease-out 1.1s both;, linePulse 3.6s ease-in-out 1.2s infinite">&gt; split-tree · tabs · panes · palette</text>
      <text x="544" y="328" font-size="12.5" fill="#6fb89a" style="animation: bootReveal 0.35s ease-out 1.1s both, okPulse 2s ease-in-out 1.8s infinite;">[ OK ]</text>
      <text x="84" y="354" font-size="12.5" fill="#B48CE8" style="animation: bootReveal 0.35s ease-out 1.4s both;, linePulse 3.6s ease-in-out 1.6s infinite">&gt; sixel + kitty image · osc 133/7/8</text>
      <text x="544" y="354" font-size="12.5" fill="#6fb89a" style="animation: bootReveal 0.35s ease-out 1.4s both, okPulse 2s ease-in-out 2.2s infinite;">[ OK ]</text>
      <text x="64" y="382" font-size="12" fill="#5a6b73">────────────────────────────────────────────</text>
      <text x="64" y="416" font-size="13" fill="#6fb89a">operator@wired:~$<tspan dx="6" fill="#B48CE8" style="animation: curBlink 1.1s step-end infinite;">█</tspan></text>
      <text x="64" y="448" font-size="11" fill="#5a6b73" letter-spacing="2">present day · present time</text>
    </g>

    <!-- UNIQUE right-zone: split-tree pane-focus cycle (the C0PL4ND signature animation) -->
    <g transform="translate(880, 222)" style="animation: flicker 9s infinite;">
      

      <rect x="0" y="0" width="248" height="200" rx="4" fill="none" stroke="#B48CE8" stroke-width="1.1" opacity="0.55" filter="url(#phos)"/>
      <line x1="124" y1="6" x2="124" y2="194" stroke="#B48CE8" stroke-width="0.7" opacity="0.45"/>
      <line x1="6" y1="100" x2="124" y2="100" stroke="#B48CE8" stroke-width="0.7" opacity="0.45"/>
      <line x1="124" y1="120" x2="242" y2="120" stroke="#B48CE8" stroke-width="0.7" opacity="0.45"/>

      <rect x="4" y="4" width="116" height="92" rx="2" fill="none" stroke="#B48CE8" stroke-width="1" style="animation: paneRing 5.2s ease-in-out 0s infinite;"/>
      <rect x="4" y="104" width="116" height="86" rx="2" fill="none" stroke="#f2b33d" stroke-width="1" style="animation: paneRing 5.2s ease-in-out 1.3s infinite;"/>
      <rect x="128" y="4" width="116" height="112" rx="2" fill="none" stroke="#8c6cd0" stroke-width="1" style="animation: paneRing 5.2s ease-in-out 2.6s infinite;"/>
      <rect x="128" y="124" width="116" height="66" rx="2" fill="none" stroke="#6fb89a" stroke-width="1" style="animation: paneRing 5.2s ease-in-out 3.9s infinite;"/>

      <g filter="url(#phos)">
        <rect x="10" y="10" width="14" height="4" rx="1" fill="#B48CE8" style="animation: paneFocus 5.2s ease-in-out 0s infinite;"/>
        <text x="30" y="14" font-size="6.5" fill="#5a6b73" letter-spacing="0.6">pane 0 · zsh</text>
        <text x="10" y="34" font-size="8" fill="#B48CE8" letter-spacing="0.6">~ $ ls -la</text>
        <text x="10" y="48" font-size="7.5" fill="#5a6b73" opacity="0.8">drwxr.. forge/</text>
        <text x="10" y="60" font-size="7.5" fill="#5a6b73" opacity="0.8">drwxr.. wire/</text>
        <text x="10" y="74" font-size="7.5" fill="#5a6b73" opacity="0.8">-rwx-. README</text>
        <text x="10" y="88" font-size="8" fill="#6fb89a" letter-spacing="0.6">~ $</text>
        <rect x="22" y="80" width="5" height="9" fill="#B48CE8" style="animation: curBlink 1.1s step-end infinite;"/>
      </g>

      <g filter="url(#phos)">
        <rect x="10" y="106" width="14" height="4" rx="1" fill="#f2b33d" style="animation: paneFocus 5.2s ease-in-out 1.3s infinite;"/>
        <text x="30" y="110" font-size="6.5" fill="#5a6b73" letter-spacing="0.6">pane 1 · btm</text>
        <rect x="10" y="118" width="108" height="6" fill="none" stroke="#5a6b73" stroke-width="0.5" opacity="0.7"/>
        <rect x="10" y="118" width="74" height="6" fill="#B48CE8" opacity="0.45"/>
        <text x="10" y="138" font-size="6.5" fill="#5a6b73">CPU 58%</text>
        <rect x="10" y="142" width="108" height="6" fill="none" stroke="#5a6b73" stroke-width="0.5" opacity="0.7"/>
        <rect x="10" y="142" width="44" height="6" fill="#8c6cd0" opacity="0.45"/>
        <text x="10" y="162" font-size="6.5" fill="#5a6b73">MEM 34%</text>
        <text x="10" y="184" font-size="6.5" fill="#6fb89a" style="animation: liveBlink 1.8s ease-in-out infinite;">[ live ]</text>
      </g>

      <g filter="url(#phos)">
        <rect x="130" y="10" width="14" height="4" rx="1" fill="#8c6cd0" style="animation: paneFocus 5.2s ease-in-out 2.6s infinite;"/>
        <text x="150" y="14" font-size="6.5" fill="#5a6b73" letter-spacing="0.6">pane 2 · log</text>
        <text x="130" y="34" font-size="7.5" fill="#8c6cd0" opacity="0.85">[INFO] gpu.bind</text>
        <text x="130" y="48" font-size="7.5" fill="#8c6cd0" opacity="0.85">[INFO] vt.parse</text>
        <text x="130" y="62" font-size="7.5" fill="#6fb89a" opacity="0.9">[ OK ] scroll 8k</text>
        <text x="130" y="76" font-size="7.5" fill="#6fb89a" opacity="0.9">[ OK ] sixel.decode</text>
        <text x="130" y="90" font-size="7.5" fill="#6fb89a" opacity="0.9">[ OK ] kitty.img</text>
        <text x="130" y="104" font-size="7.5" fill="#5a6b73" opacity="0.7">tailing...</text>
      </g>

      <g filter="url(#phos)">
        <rect x="130" y="126" width="14" height="4" rx="1" fill="#6fb89a" style="animation: paneFocus 5.2s ease-in-out 3.9s infinite;"/>
        <text x="150" y="130" font-size="6.5" fill="#5a6b73" letter-spacing="0.6">pane 3 · img</text>
        <rect x="130" y="138" width="108" height="48" rx="1.5" fill="none" stroke="#6fb89a" stroke-width="0.6" opacity="0.55"/>
        <g opacity="0.7" stroke="#6fb89a" stroke-width="0.7" fill="none">
          <circle cx="158" cy="162" r="10"/>
          <line x1="148" y1="162" x2="168" y2="162"/>
          <line x1="158" y1="152" x2="158" y2="172"/>
          <path d="M150 158 q8 -6 16 0 q-8 6 -16 0"/>
          <path d="M150 166 q8 -6 16 0 q-8 6 -16 0"/>
        </g>
        <g transform="translate(180, 144)">
          <rect x="0" y="0" width="50" height="8" fill="#B48CE8" opacity="0.25"/>
          <rect x="0" y="12" width="40" height="3" fill="#5a6b73" opacity="0.6"/>
          <rect x="0" y="18" width="46" height="3" fill="#5a6b73" opacity="0.6"/>
          <rect x="0" y="24" width="32" height="3" fill="#5a6b73" opacity="0.6"/>
          <rect x="0" y="30" width="44" height="3" fill="#5a6b73" opacity="0.6"/>
        </g>
      </g>

      <g transform="translate(122, -2)">
        <rect x="-22" y="0" width="44" height="9" rx="2" fill="#070a0c" stroke="#8c6cd0" stroke-width="0.6" opacity="0.7"/>
        <circle cx="-14" cy="4.5" r="1.5" fill="#6fb89a" opacity="0.9" style="animation: nodeBlink 2s ease-in-out infinite;"/>
        <text x="-6" y="7.2" font-size="6" fill="#5a6b73" letter-spacing="0.8">SPLIT-TREE</text>
      </g>
    </g>
  </g>

  <g>
    <circle cx="56" cy="536" r="3.5" fill="#6fb89a" opacity="0.7" style="animation: heartbeat 2.4s ease-in-out infinite; transform-origin: 56px 536px;"/>
    <circle cx="71" cy="536" r="3" fill="#B48CE8" opacity="0.45"/>
    <circle cx="86" cy="536" r="3" fill="#5050ff" opacity="0.4"/>
    <text x="108" y="536" font-size="9" fill="#3a4a52" letter-spacing="3.2" dominant-baseline="central">ITASHA.CORP</text>
    <text x="640" y="536" font-size="9" fill="#3a4a52" letter-spacing="3" dominant-baseline="central" text-anchor="middle">WIRED-SHELL</text>
    <text x="1208" y="536" font-size="9" fill="#3a4a52" letter-spacing="2.4" dominant-baseline="central" text-anchor="end">CRT-IC v2</text>
    <circle cx="1224" cy="536" r="4" fill="#6fb89a" opacity="0.5"/>
    <circle cx="1224" cy="536" r="2" fill="#6fb89a" opacity="0.95" style="animation: heartbeat 2.4s ease-in-out infinite; transform-origin: 1224px 536px;"/>
