# cargo-mutants configuration (https://mutants.rs).
#
# Mutation testing measures whether the test suite actually CATCHES bugs: it
# injects small changes (mutants) into the code and checks a test fails. A
# "missed" mutant is a line the tests run but do not actually assert on — a
# coverage blind spot that line-coverage alone cannot see.
#
# Run locally:   cargo mutants                 # full sweep
#                cargo mutants --in-diff <(git diff origin/master)   # PR-scoped
# CI runs the diff-scoped form on every PR (.github/workflows/mutants.yml).

# Tests of a real PTY / terminal can be slow; give a generous multiple of the
# baseline test time before a mutant is judged "timed out" (vs genuinely caught).
timeout_multiplier = 5.0
minimum_test_timeout = 120

# Focus mutation effort on the high-signal pure logic — the VT parser, grid
# model, config, theming, layout — where a missed mutant is a real test gap.
# The GPU/egui render path and binary entry-point shells are driven by the
# kittest interaction tests and are not productive mutation targets.
examine_globs = ["crates/core/src/**"]

exclude_globs = [
    "crates/*/benches/**",
    "crates/*/tests/**",
    "**/build.rs",
    "crates/core/src/term/tests.rs",
    # Thin cfg(windows) OS-flag shim: its only real branch — applying
    # CREATE_NO_WINDOW via CommandExt::creation_flags — is `#[cfg(windows)]`
    # and is therefore NOT compiled on the Linux mutants runner, so no test can
    # ever kill a mutant in it here (the non-Windows branch is a bare `self`).
    # Same class as the render/entry-shell exclusions above: not a productive
    # mutation target on this runner. Correctness is pinned by its unit tests.
    "crates/core/src/win_process.rs",
]

# `--in-diff` mode does not honour exclude_globs for a file that is inside
# examine_globs, so also exclude the cfg(windows)-only shim by mutant name.
# exclude_re matches the generated mutant description (function path), which is
# the reliable filter for a single un-testable-on-Linux function.
exclude_re = [
    "no_console_window",
]
