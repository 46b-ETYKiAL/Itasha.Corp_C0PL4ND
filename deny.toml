# cargo-deny configuration — supply-chain gate for C0PL4ND.
# Run: cargo deny check

[advisories]
version = 2
# Fail on any security advisory in the dependency tree.
yanked = "deny"
# RUSTSEC-2017-0008: `serial` unmaintained (informational advisory, NOT a
# memory-safety/exploitable vulnerability). Pulled in transitively by
# portable-pty 0.8.1's Windows serial handling; C0PL4ND does not use the
# serial API surface. The fix (portable-pty 0.9.0, which swaps `serial` for
# `serial2`) is BLOCKED: 0.9.0 has an open, unfixed Windows ConPTY regression
# where pty.read returns garbage/empty output — https://github.com/wezterm/wezterm/issues/6783
# (0.9.0 is the latest crates.io release). Re-evaluate and drop this ignore when
# portable-pty > 0.9.0 ships the wezterm#6783 fix. See .github/scorecard-notes.md.
#
# RUSTSEC-2026-0173: `proc-macro-error2` is UNMAINTAINED (informational advisory,
# NOT an exploitable vulnerability). It is a BUILD-TIME proc-macro helper pulled
# transitively by `i18n-embed-fl` <- `age` <- the in-house `itasha-report-core`
# W1TN3SS reporting SDK (age provides the report E2E-encryption stack). It never
# enters the shipped binary's runtime attack surface (proc-macros run only at
# compile time). `cargo audit` already classifies it as an allowed warning; this
# mirrors that accepted-risk posture for `cargo deny`. Re-evaluate and drop this
# ignore when `age` / `i18n-embed-fl` migrate off `proc-macro-error2`.
#
# RUSTSEC-2024-0436: `paste` is UNMAINTAINED (informational advisory, NOT an
# exploitable vulnerability). It is a BUILD-TIME proc-macro helper pulled
# transitively by the Arti Tor stack (`paste` <- `tor-error` <- arti-client),
# which enters the tree ONLY via the opt-in `itasha-report-transport-tor`
# anonymous-transport crate. proc-macros run at compile time only and never
# enter the shipped binary's runtime attack surface. There is no maintained
# drop-in replacement upstream Arti has migrated to yet. Re-evaluate and drop
# this ignore when the Arti `tor-error` line migrates off `paste`.
#
# RUSTSEC-2023-0071: `rsa` Marvin Attack — a timing side-channel in the `rsa`
# crate. NO PATCH IS AVAILABLE upstream (the advisory itself states a
# constant-time implementation is still in progress). It enters the tree ONLY
# transitively through the Arti Tor directory-crypto stack pulled by the opt-in
# `itasha-report-transport-tor` crate. The attack requires an adversary to
# observe RSA-operation timing over the network; in the W1TN3SS onion-transport
# context the RSA usage is in Tor's own directory/handshake crypto (operated by
# Arti, not by C0PL4ND-supplied keys), and the option is OFF by default. There
# is no available fix to bump to. Re-evaluate and drop this ignore when `rsa`
# ships a constant-time release and Arti adopts it.
#
# RUSTSEC-2026-0192: `ttf-parser` is UNMAINTAINED (informational advisory, NOT
# an exploitable vulnerability). The author has stated the crate will receive no
# further fixes. It is a pure-Rust font-glyph parser pulled transitively by the
# egui text-rendering stack (`ttf-parser` <- `fontdb` <- `cosmic-text` <-
# `glyphon`, and `fontdb` directly), used to lay out the terminal's own glyphs.
# It is the de-facto font parser the entire egui/cosmic-text ecosystem depends
# on; there is no maintained drop-in the upstream stack has migrated to. Re-
# evaluate and drop this ignore when fontdb/cosmic-text migrate to a maintained
# font parser.
#
# RUSTSEC-2025-0141: `bincode` is UNMAINTAINED (informational advisory, NOT an
# exploitable vulnerability). `bincode` 2.0.1 enters the lock file ONLY as an
# OPTIONAL, feature-gated dependency of `typed-index-collections` that this
# build never enables — it is NOT compiled into either binary (`cargo tree -i
# bincode` prints "nothing to print"; cargo-deny scans the full lock file
# regardless of feature activation). With zero presence in the actual build
# graph, runtime exposure is nil. Re-evaluate and drop this ignore if a future
# feature pulls `bincode` into the build, or when the upstream crate drops it.
#
# NOTE (2026-06-30): RUSTSEC-2026-0190 (`anyhow`) and RUSTSEC-2026-0186
# (`memmap2`) were REMOVED from this list — anyhow is at the patched 1.0.103 and
# memmap2 was bumped to the patched 0.9.11, so both advisories are now RESOLVED
# in the locked graph rather than suppressed. Verified against rustsec.org:
# anyhow fixed in >=1.0.103, memmap2 fixed in >=0.9.11.
#
# RUSTSEC-2026-0194 + RUSTSEC-2026-0195 (2026-07-02): `quick-xml` <0.41 XML-parser
# DoS advisories (quadratic duplicate-attribute check; unbounded namespace-decl
# allocation). `quick-xml` 0.39.4 enters the lock file ONLY via `wayland-scanner`
# (`cargo tree -i quick-xml`: wayland-scanner → smithay-client-toolkit → winit),
# a LINUX-ONLY, BUILD-TIME proc-macro that parses the TRUSTED, local Wayland
# protocol XML files shipped with the toolchain — never untrusted runtime input,
# and not compiled at all on Windows/macOS. Runtime DoS exposure is nil. No fix is
# reachable without a breaking `wayland-scanner`/`winit` bump (it pins
# `quick-xml = "^0.39"`). Re-evaluate and drop when the winit/wayland stack
# migrates to `quick-xml >= 0.41`.
ignore = [
    "RUSTSEC-2017-0008",
    "RUSTSEC-2026-0173",
    "RUSTSEC-2024-0436",
    "RUSTSEC-2023-0071",
    "RUSTSEC-2026-0192",
    "RUSTSEC-2025-0141",
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
version = 2
# Allow the permissive licenses common in the wgpu/winit/glyphon ecosystem.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
    # Community Data License Agreement — Permissive 2.0; permissive, entered the
    # tree transitively via the sysinfo dependency. Compatible with MIT/Apache.
    "CDLA-Permissive-2.0",
    # Font licenses for egui's bundled default fonts (`epaint_default_fonts`):
    # OFL-1.1 (SIL Open Font License — Hack/NotoEmoji) and Ubuntu-font-1.0 (the
    # Ubuntu font). Both are OSI/FSF-recognised permissive font licenses that
    # explicitly allow embedding + redistribution in software, so shipping the
    # bundled fonts is compliant. The fonts ship as data; no code is OFL/UFL.
    "OFL-1.1",
    "Ubuntu-font-1.0",
    # The Unlicense (public-domain dedication; OSI-approved + FSF Free/Libre).
    # Entered the tree transitively via `async_executors` <- `tor-rtcompat` <-
    # arti-client (pulled only by the opt-in `itasha-report-transport-tor`
    # anonymous Tor transport). Public-domain dedication is maximally permissive
    # and compatible with shipping; no copyleft obligation.
    "Unlicense",
]
confidence-threshold = 0.8

[bans]
# Warn on multiple versions of the same crate; deny known-bad crates.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# In-house W1TN3SS opt-in crash/issue reporting SDK + opt-in Tor transport
# (first-party, pinned by exact commit rev).
allow-git = ["https://github.com/46b-ETYKiAL/Itasha.Corp_S4F3-W1TN3SS.git"]
