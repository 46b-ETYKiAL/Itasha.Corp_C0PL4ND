      <line x1="392" y1="392" x2="392" y2="632"/><line x1="472" y1="392" x2="472" y2="632"/><line x1="552" y1="392" x2="552" y2="632"/><line x1="632" y1="392" x2="632" y2="632"/>
    </g>
  </g>
  <g stroke="#1ad6c0" fill="none">
    <circle cx="512" cy="512" r="372" stroke-width="6" opacity="0.85"/>
    <circle cx="512" cy="512" r="344" stroke-width="3" opacity="0.5"/>
    <g stroke-width="7" opacity="0.8">
      <line x1="512" y1="140" x2="512" y2="168"/><line x1="698" y1="190.2" x2="684" y2="214.4"/><line x1="834" y1="326" x2="809.8" y2="340"/><line x1="884" y1="512" x2="856" y2="512"/>
      <line x1="834" y1="698" x2="809.8" y2="684"/><line x1="698" y1="833.8" x2="684" y2="809.6"/><line x1="326" y1="833.8" x2="340" y2="809.6"/><line x1="190" y1="698" x2="214.2" y2="684"/>
      <line x1="140" y1="512" x2="168" y2="512"/><line x1="190" y1="326" x2="214.2" y2="340"/><line x1="326" y1="190.2" x2="340" y2="214.4"/><line x1="512" y1="856" x2="512" y2="884"/>
    </g>
  </g>
  <g stroke="#1ad6c0" stroke-width="6" fill="none" opacity="0.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M512 168 L512 250 M494 218 L512 250 L530 218"/>
