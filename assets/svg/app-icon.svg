<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="C0PL4ND app icon">
  <title>C0PL4ND app icon - monochrome daemon-sigil (summoning seal + terminal prompt)</title>
  <desc>Monochrome phosphor-teal daemon-sigil: a void CRT plate carrying the C0PL4ND core mark (bold prompt chevron + cursor block) as the operative figure of an original summoning seal - double containment ring with 12 radial seal-ticks, a faint kamea grid, four odd-count goetic bind-rune spikes pointing inward, three cardinal pommel dots, and a daemon fork() trident (the demon/daemon pun) as the infernal signature at the base. Single hue (#1ad6c0), shades by opacity only. At 16px all seal chrome vanishes; only the teal keyline + bright prompt silhouette remain.</desc>
  <defs>
    <radialGradient id="vig" cx="50%" cy="48%" r="62%">
      <stop offset="0%" stop-color="#08060d" stop-opacity="0"/><stop offset="74%" stop-color="#08060d" stop-opacity="0"/><stop offset="100%" stop-color="#08060d" stop-opacity="0.65"/>
    </radialGradient>
    <radialGradient id="bloom" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#1ad6c0" stop-opacity="0.16"/><stop offset="100%" stop-color="#1ad6c0" stop-opacity="0"/>
    </radialGradient>
    <filter id="phos" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="clip"><rect x="80" y="80" width="864" height="864" rx="176"/></clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <circle cx="512" cy="512" r="360" fill="url(#bloom)"/>
    <g stroke="#1ad6c0" stroke-width="3" opacity="0.15">
