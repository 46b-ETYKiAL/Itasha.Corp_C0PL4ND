<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="C0PL4ND app icon">
  <title>C0PL4ND app icon</title>
  <desc>App icon: terminal prompt chevron and cursor block in signal teal on void black, operator violet ring, CRT vignette curvature, corner registration ticks, scanlines.</desc>
  <defs>
    <pattern id="ai-scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#08060d"/>
      <rect width="8" height="1.6" fill="#f0eef5" opacity="0.05"/>
    </pattern>
    <radialGradient id="ai-crt" cx="50%" cy="46%" r="62%">
      <stop offset="0%" stop-color="#08060d" stop-opacity="0"/>
      <stop offset="74%" stop-color="#08060d" stop-opacity="0"/>
      <stop offset="100%" stop-color="#08060d" stop-opacity="0.85"/>
    </radialGradient>
    <radialGradient id="ai-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ai-clip">
      <rect x="40" y="40" width="432" height="432" rx="88"/>
    </clipPath>
  </defs>

  <!-- backdrop -->
  <rect width="512" height="512" fill="#08060d"/>

  <!-- icon plate -->
  <rect x="40" y="40" width="432" height="432" rx="88" fill="#08060d"/>
  <g clip-path="url(#ai-clip)">
    <rect x="40" y="40" width="432" height="432" fill="url(#ai-scan)"/>
    <rect x="40" y="40" width="432" height="432" fill="url(#ai-glow)"/>
    <!-- CRT curvature vignette -->
    <rect x="40" y="40" width="432" height="432" fill="url(#ai-crt)"/>
  </g>

  <!-- operator violet ring -->
  <rect x="40" y="40" width="432" height="432" rx="88" fill="none" stroke="#a020ff" stroke-width="6"/>

  <!-- corner registration ticks (infra signage) -->
  <g stroke="#00e5ff" stroke-width="4" opacity="0.7">
    <line x1="84" y1="84" x2="124" y2="84"/>
    <line x1="84" y1="84" x2="84" y2="124"/>
    <line x1="428" y1="84" x2="388" y2="84"/>
    <line x1="428" y1="84" x2="428" y2="124"/>
    <line x1="84" y1="428" x2="124" y2="428"/>
    <line x1="84" y1="428" x2="84" y2="388"/>
    <line x1="428" y1="428" x2="388" y2="428"/>
    <line x1="428" y1="428" x2="428" y2="388"/>
  </g>

  <!-- prompt chevron ">" -->
  <path d="M168 184 L246 256 L168 328" fill="none" stroke="#00e5ff" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- cursor block -->
  <rect x="276" y="296" width="92" height="34" rx="4" fill="#00ffb3"/>
</svg>
