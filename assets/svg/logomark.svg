<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="C0PL4ND logomark">
  <title>C0PL4ND logomark</title>
  <desc>Compact terminal prompt mark: a chevron and cursor block in signal teal on void black inside a rounded square with an operator violet ring and scanlines.</desc>
  <defs>
    <pattern id="lm-scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#08060d"/>
      <rect width="6" height="1.2" fill="#f0eef5" opacity="0.05"/>
    </pattern>
    <clipPath id="lm-clip">
      <rect x="20" y="20" width="216" height="216" rx="40"/>
    </clipPath>
  </defs>

  <!-- backdrop -->
  <rect width="256" height="256" fill="#08060d"/>

  <!-- rounded square plate -->
  <rect x="20" y="20" width="216" height="216" rx="40" fill="#08060d"/>
  <g clip-path="url(#lm-clip)">
    <rect x="20" y="20" width="216" height="216" fill="url(#lm-scan)"/>
  </g>

  <!-- operator violet ring -->
  <rect x="20" y="20" width="216" height="216" rx="40" fill="none" stroke="#a020ff" stroke-width="4"/>

  <!-- prompt chevron ">" -->
  <path d="M78 92 L116 128 L78 164" fill="none" stroke="#00e5ff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- cursor block -->
  <rect x="132" y="148" width="46" height="18" rx="2" fill="#00ffb3"/>
</svg>
