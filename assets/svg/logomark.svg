<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 1024 1024" role="img" aria-label="C0PL4ND app icon — logomark">
  <title>C0PL4ND app icon — Concept B: daemon seal (quiet monogram, low-risk)</title>
  <desc>CONCEPT, master tier. The quieter, monogram-like "daemon seal" reading and the lowest public-risk option — closest to the existing icon. Void-black CRT plate, unchanged C0PL4ND core mark (phosphor-cyan chevron + teal cursor block), a single operator-violet ring with 6 abstract radial seal-ticks (rose-derived, no real script), one compact ORIGINAL sigil polyline glyph riding the lower band (derived from the brand string, not traced), and the cursor block subtly extended into a small three-prong fork notch (trident-as-cursor = fork()/daemon pun). 16px-read: ring simplifies to keyline, ticks/glyph/fork vanish; only violet keyline + cyan chevron silhouette remain. Seal detail is additive only.</desc>
  <defs>
    <pattern id="cb-scan" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#08060d"/>
      <rect width="16" height="3" fill="#f0eef5" opacity="0.045"/>
    </pattern>
    <radialGradient id="cb-vig" cx="50%" cy="46%" r="64%">
      <stop offset="0%" stop-color="#08060d" stop-opacity="0"/>
      <stop offset="78%" stop-color="#08060d" stop-opacity="0"/>
      <stop offset="100%" stop-color="#08060d" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="cb-glow" cx="50%" cy="50%" r="56%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="cb-phos" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cb-clip"><rect x="80" y="80" width="864" height="864" rx="176"/></clipPath>
  </defs>

  <rect x="80" y="80" width="864" height="864" rx="176" fill="#08060d"/>
  <g clip-path="url(#cb-clip)">
    <rect x="80" y="80" width="864" height="864" fill="url(#cb-scan)"/>
    <rect x="80" y="80" width="864" height="864" fill="url(#cb-glow)"/>
    <rect x="80" y="80" width="864" height="864" fill="url(#cb-vig)"/>
  </g>

  <!-- plate keyline (small-tier survivor) -->
  <rect x="80" y="80" width="864" height="864" rx="176" fill="none" stroke="#a020ff" stroke-width="10"/>

  <!-- single summoning ring + 6 abstract radial seal-ticks -->
  <g stroke="#a020ff" fill="none">
    <circle cx="512" cy="512" r="360" stroke-width="6" opacity="0.8"/>
    <g stroke-width="8" opacity="0.8">
      <line x1="512" y1="152" x2="512" y2="184"/>
      <line x1="823.8" y1="332" x2="796" y2="348"/>
      <line x1="823.8" y1="692" x2="796" y2="676"/>
      <line x1="512" y1="872" x2="512" y2="840"/>
      <line x1="200.2" y1="692" x2="228" y2="676"/>
      <line x1="200.2" y1="332" x2="228" y2="348"/>
    </g>
  </g>

  <!-- ORIGINAL compact sigil polyline glyph on the lower band (brand-string derived; start-circle + end-bar convention) -->
  <g stroke="#a020ff" stroke-width="5" fill="none" opacity="0.55" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="430" cy="760" r="8" fill="#a020ff" stroke="none"/>
    <path d="M430 760 L500 792 L560 752 L596 800"/>
    <line x1="596" y1="800" x2="624" y2="788"/>
  </g>

  <!-- UNCHANGED core mark + trident-as-cursor fork notch on the cursor block -->
  <g filter="url(#cb-phos)">
    <path d="M312 336 L520 512 L312 688" fill="none" stroke="#00e5ff" stroke-width="92" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="576" y="566" width="168" height="64" rx="8" fill="#00ffb3"/>
    <!-- three-prong fork notch extending the cursor block (fork()/daemon trident) -->
    <g stroke="#00ffb3" stroke-width="10" stroke-linecap="round">
      <line x1="744" y1="598" x2="788" y2="568"/>
      <line x1="744" y1="598" x2="792" y2="598"/>
      <line x1="744" y1="598" x2="788" y2="628"/>
    </g>
    <circle cx="792" cy="598" r="6" fill="#ff0040"/>
  </g>
</svg>
