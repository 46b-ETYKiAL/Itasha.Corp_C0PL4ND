# Atompunk Sodium — ported from the SCR1B3 editor (heritage-alt line).
# Eames-era atompunk. OPT-IN ONLY: sodium-orange-as-system-voice is a
# documented exception to the accent discipline.
name = "Atompunk Sodium"
author = "Itasha.Corp"

background = "#0c0a08"
foreground = "#e0d8c8"
cursor = "#ffa030"
cursor_text = "#0c0a08"
selection_background = "#241f18"
