[normal]
black = "#16130e"
red = "#d8302a"
green = "#8ab098"
yellow = "#ffa030"
blue = "#7a90b0"
magenta = "#a8b8c4"
cyan = "#3acab8"
white = "#e0d8c8"

[bright]
black = "#5a544a"
red = "#f0504a"
green = "#a8c4b4"
yellow = "#ffc060"
blue = "#a0b0c8"
magenta = "#c0c4c8"
