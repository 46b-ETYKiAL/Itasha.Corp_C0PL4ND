# Itasha Void — flagship default theme.
# Lain/GitS retro-future OS terminal: void-black hull, ghost-paper text,
# signal-teal cursor cutting through the dark like a CRT scanline.
# WCAG contrast (foreground on background): 17.51:1 (AAA, far exceeds 7:1).
name = "Itasha Void"
author = "Itasha.Corp"

# base UI colors
background = "#08060d"
foreground = "#f0eef5"
cursor = "#00e5ff"
cursor_text = "#08060d"
selection_background = "#3a1a55"
selection_foreground = "#f0eef5"

[normal]   # ANSI 0-7
black = "#2a2833"
red = "#ff0040"
green = "#00ffb3"
yellow = "#d9a521"
blue = "#0066ff"
magenta = "#e020ff"
cyan = "#00e5ff"
white = "#c8c4d4"

[bright]   # ANSI 8-15
black = "#5a5869"
red = "#ff4d7d"
green = "#5cffd0"
yellow = "#ffce5c"
blue = "#4d94ff"
magenta = "#f06aff"
cyan = "#66f0ff"
white = "#f0eef5"
