selection_background = "#1a2230"
selection_foreground = "#c0ccd4"

[normal]
black = "#0e1218"
red = "#ff3b30"
green = "#5af0a0"
yellow = "#e0b45a"
blue = "#6aa0e0"
magenta = "#b481d0"
cyan = "#48c8b0"
white = "#c0ccd4"

[bright]
black = "#36424e"
red = "#ff6a5c"
green = "#88f4bc"
yellow = "#f0cc82"
blue = "#92b8ea"
magenta = "#d0a6ea"
