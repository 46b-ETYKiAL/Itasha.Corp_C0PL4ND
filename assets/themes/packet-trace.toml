# Packet Trace — ported from the SCR1B3 editor (Wave-4 line).
# Cybersecurity / Wireshark-dark: an acid-green system voice over a cold
# capture-black, distinct alert-amber warnings + alarm-red errors.
# SCR1B3 map palette translated onto C0PL4ND's ANSI-16 terminal schema.
name = "Packet Trace"
author = "Itasha.Corp"

background = "#07090c"
foreground = "#c0ccd4"
cursor = "#5af0a0"
